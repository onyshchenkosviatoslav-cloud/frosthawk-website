<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Конструктор схем — Frost Hawk HVAC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0e13;
    --panel:#11161d;
    --panel2:#161d27;
    --panel3:#1c2530;
    --line:#222b36;
    --ice:#4fd1ff;
    --ice-dim:#1f5d72;
    --ember:#ff8a4c;
    --text:#e9eef3;
    --text-dim:#8fa0ad;
    --danger:#ff5d5d;
    --good:#4fdc8f;
    --canvas-bg:#0c1219;
    --radius:10px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif;
    overflow:hidden; position:fixed; inset:0;
    display:flex; flex-direction:column;
  }
  h1,h2,h3,.disp{font-family:'Bebas Neue',sans-serif; letter-spacing:.04em;}
  button{font-family:inherit; cursor:pointer;}
  input,select{font-family:inherit;}

  /* ---------- TOPBAR ---------- */
  #topbar{
    display:flex; align-items:center; gap:6px;
    padding:8px 10px; background:var(--panel);
    border-bottom:1px solid var(--line); flex:0 0 auto; z-index:30;
  }
  #topbar .brand{display:flex; align-items:center; gap:6px; flex:0 0 auto;}
  #topbar .brand .ico{width:24px;height:24px;flex:0 0 auto;}
  #topbar h1{font-size:17px; margin:0; line-height:1; color:var(--ice); white-space:nowrap;}
  #projName{
    background:transparent; border:1px solid transparent; color:var(--text);
    font-size:13px; font-weight:600; padding:6px 6px; border-radius:8px;
    min-width:0; max-width:120px; flex:1 1 auto;
  }
  #projName:focus{border-color:var(--ice-dim); outline:none; background:var(--panel2);}
  .iconbtn{
    background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:7px 8px; font-size:11px; font-weight:600;
    display:flex; align-items:center; gap:4px; white-space:nowrap;
  }
  .iconbtn:active{transform:scale(.96);}
  .iconbtn.ghost{background:transparent;}
  .iconbtn svg{width:16px;height:16px;flex:0 0 auto;}
  #saveDot{width:7px;height:7px;border-radius:50%; background:var(--good); flex:0 0 auto; transition:background .2s;}
  #saveDot.busy{background:var(--ember);}
  #saveDot.err{background:var(--danger);}
  #topRight{display:flex; gap:4px; flex:0 0 auto; overflow-x:auto; -webkit-overflow-scrolling:touch;}
  @media (max-width:400px){
    #topbar h1{display:none;}
    #projName{max-width:90px;}
  }

  /* ---------- LAYOUT ---------- */
  #workspace{flex:1 1 auto; display:flex; min-height:0; position:relative;}
  #palette{
    flex:0 0 auto; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:10px 8px; width:120px;
  }
  .pgroup{margin-bottom:14px;}
  .pgroup h3{font-size:11px; color:var(--text-dim); margin:0 0 6px 2px; font-weight:600; letter-spacing:.06em; font-family:'DM Sans',sans-serif; text-transform:uppercase;}
  .pitem{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:8px 4px; margin-bottom:6px; width:100%;
  }
  .pitem .swatch{width:38px;height:38px; display:flex; align-items:center; justify-content:center;}
  .pitem .lbl{font-size:9.5px; color:var(--text-dim); text-align:center; line-height:1.15; font-weight:600;}
  .pitem.active{border-color:var(--ice); box-shadow:0 0 0 2px rgba(79,209,255,.25);}
  .pitem:active{transform:scale(.96);}

  #canvasWrap{
    flex:1 1 auto; overflow:auto; position:relative; background:var(--canvas-bg);
    touch-action:pan-x pan-y;
  }
  #board{display:block; touch-action:pan-x pan-y;}
  .node, .wirehit, .handle, .terminal{touch-action:none;}
  #emptyHint{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:var(--text-dim); font-size:14px; text-align:center; pointer-events:none;
    width:240px; line-height:1.5;
  }

  #inspector{
    position:fixed; left:0; right:0; bottom:0; background:var(--panel);
    border-top:1px solid var(--line); border-radius:14px 14px 0 0;
    padding:14px 16px calc(14px + var(--safe-b)); transform:translateY(110%);
    transition:transform .22s ease; z-index:40; box-shadow:0 -8px 30px rgba(0,0,0,.5);
    max-height:60vh; overflow-y:auto;
  }
  #inspector.open{transform:translateY(0);}
  #inspector .row{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  #inspector label{font-size:11px; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:.04em; display:block; margin-bottom:4px;}
  #inspector input[type=text], #inspector select{
    width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:9px 10px; font-size:14px;
  }
  #inspector input[type=text]:focus, #inspector select:focus{outline:none; border-color:var(--ice-dim);}
  #inspHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  #inspHead .title{font-size:18px; font-family:'Bebas Neue',sans-serif; color:var(--ice);}
  .swrow{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:10px;}
  .swdot{width:30px;height:30px;border-radius:50%; border:2px solid transparent; flex:0 0 auto;}
  .swdot.sel{border-color:var(--ice);}
  .btnrow{display:flex; gap:8px; margin-top:4px; flex-wrap:wrap;}
  .btn{
    border:1px solid var(--line); background:var(--panel2); color:var(--text);
    border-radius:8px; padding:9px 14px; font-size:13px; font-weight:600; flex:1 1 auto;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn:active{transform:scale(.97);}
  .btn.danger{background:rgba(255,93,93,.12); border-color:rgba(255,93,93,.4); color:var(--danger);}
  .btn.primary{background:var(--ice); border-color:var(--ice); color:#04222b;}
  .btn.ghost{background:transparent;}

  /* ---------- BOTTOM TOOLBAR ---------- */
  #toolbar{
    flex:0 0 auto; display:flex; gap:6px; padding:8px 10px calc(8px + var(--safe-b));
    background:var(--panel); border-top:1px solid var(--line); overflow-x:auto; z-index:25;
  }
  .tbtn{
    flex:0 0 auto; min-width:58px; background:var(--panel2); border:1px solid var(--line);
    color:var(--text-dim); border-radius:9px; padding:8px 6px; display:flex; flex-direction:column;
    align-items:center; gap:3px; font-size:9.5px; font-weight:700; text-transform:uppercase;
  }
  .tbtn svg{width:19px;height:19px;}
  .tbtn.active{border-color:var(--ice); color:var(--ice); background:rgba(79,209,255,.08);}
  .tbtn:disabled{opacity:.35;}
  .tbtn.danger-tone{color:var(--danger);}
  #zoomLbl{font-size:9.5px; color:var(--text-dim); align-self:center; min-width:34px; text-align:center;}

  /* ---------- STATUS BANNER ---------- */
  #statusBar{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--ice-dim); color:var(--ice);
    padding:8px 12px; border-radius:30px; font-size:12.5px; font-weight:600;
    display:none; align-items:center; gap:10px; z-index:20; box-shadow:0 4px 16px rgba(0,0,0,.4);
    max-width:90%;
  }
  #statusBar.show{display:flex;}
  #statusBar button{background:rgba(255,93,93,.15); color:var(--danger); border:none; border-radius:14px; padding:4px 10px; font-size:11px; font-weight:700;}

  /* ---------- LEGEND (auto-built key for colors/shapes used in the diagram) ---------- */
  #legendPanel{
    position:absolute; top:10px; right:10px; z-index:22;
    display:flex; flex-direction:column; align-items:flex-end; gap:6px;
  }
  #legendToggle{
    background:var(--panel); border:1px solid var(--line); color:var(--text);
    width:32px; height:32px; border-radius:50%; font-size:14px; line-height:1;
    display:flex; align-items:center; justify-content:center; box-shadow:0 2px 10px rgba(0,0,0,.35);
  }
  #legendBody{
    display:none; background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; max-width:200px; max-height:55vh; overflow-y:auto;
    font-size:11.5px; box-shadow:0 6px 22px rgba(0,0,0,.45);
  }
  #legendBody.open{display:block;}
  .legendGroup{margin-bottom:8px;}
  .legendGroup:last-child{margin-bottom:0;}
  .legendTitle{font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); font-weight:700; margin-bottom:4px;}
  .legendRow{display:flex; align-items:center; gap:7px; padding:2.5px 0; font-weight:600; color:var(--text);}
  .legendSwatch{width:12px; height:12px; border-radius:3px; flex:0 0 auto; border:1px solid rgba(255,255,255,.25);}
  .legendEmpty{color:var(--text-dim); font-size:11px; max-width:150px;}

  /* ---------- MODAL ---------- */
  #modalLayer{
    position:fixed; inset:0; background:rgba(4,6,9,.72); display:none;
    align-items:flex-end; justify-content:center; z-index:60; backdrop-filter:blur(2px);
  }
  #modalLayer.show{display:flex;}
  .modalCard{
    background:var(--panel); border-radius:16px 16px 0 0; width:100%; max-width:480px;
    max-height:85vh; overflow-y:auto; padding:18px 18px calc(18px + var(--safe-b));
    border-top:1px solid var(--line);
  }
  @media (min-width:640px){
    #modalLayer{align-items:center;}
    .modalCard{border-radius:16px;}
  }
  .modalCard h2{font-size:22px; margin:0 0 12px; color:var(--ice);}
  .countGrid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;}
  .countBtn{
    background:var(--panel2); border:1px solid var(--line); border-radius:10px;
    padding:10px 4px; display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .countBtn:active{transform:scale(.95);}
  .countBtn .n{font-family:'Bebas Neue',sans-serif; font-size:20px; color:var(--text);}
  .countBtn .dots{display:flex; gap:2px;}
  .countBtn .dots i{width:6px;height:6px;border-radius:50%; display:inline-block;}
  .miniHelp{font-size:12px; color:var(--text-dim); margin-bottom:10px; line-height:1.5;}
  .customWrap{display:none; border-top:1px solid var(--line); padding-top:12px; margin-top:6px;}
  .customWrap.show{display:block;}
  .customWrap .row{display:flex; gap:10px; align-items:center; margin-bottom:10px;}
  .colorPick{width:46px;height:40px;border-radius:8px;border:1px solid var(--line); background:var(--panel2); padding:0;}
  .projList{display:flex; flex-direction:column; gap:6px; margin-top:6px;}
  .projRow{
    display:flex; align-items:center; gap:8px; background:var(--panel2); border:1px solid var(--line);
    border-radius:10px; padding:10px 10px;
  }
  .projRow .pname{flex:1 1 auto; font-size:14px; font-weight:600;}
  .projRow .pdate{font-size:10.5px; color:var(--text-dim);}
  .projRow button{background:transparent; border:none; color:var(--text-dim); padding:6px;}
  .projRow .del{color:var(--danger);}

  #toast{
    position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px);
    background:var(--panel3); border:1px solid var(--line); color:var(--text);
    padding:9px 16px; border-radius:30px; font-size:12.5px; font-weight:600; z-index:80;
    opacity:0; transition:opacity .2s, transform .2s; pointer-events:none;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* node / wire svg helpers */
  .wire-label-bg{fill:#0a0e13; opacity:.88;}
  .wire-label{fill:#e9eef3; font-size:11px; font-family:'DM Sans',sans-serif; font-weight:600;}
  .node-abbr{fill:#0a0e13; font-size:13px; font-weight:700; font-family:'DM Sans',sans-serif; text-anchor:middle; dominant-baseline:middle; pointer-events:none;}
  .node-label{fill:#c7d3dc; font-size:11px; font-family:'DM Sans',sans-serif; text-anchor:middle; pointer-events:none;}
  .node-shape{stroke-width:2;}
  .node.selected .node-shape{stroke:var(--ice) !important; stroke-width:3;}

  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#2a3440; border-radius:8px;}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <svg class="ico" viewBox="0 0 24 24" fill="none"><path d="M12 2L4 7v10l8 5 8-5V7l-8-5z" stroke="#4fd1ff" stroke-width="1.6" fill="none"/><path d="M12 7v10M7.5 9.5l9 5M16.5 9.5l-9 5" stroke="#4fd1ff" stroke-width="1.4"/></svg>
    <h1>СХЕМИ</h1>
  </div>
  <input id="projName" value="Нова схема" maxlength="60">
  <div id="saveDot" title="Статус збереження"></div>
  <div id="topRight">
    <a href="admin.html" class="iconbtn ghost" id="btnBackAdmin" title="Назад до адмінки">← Admin</a>
    <button class="iconbtn ghost" id="btnFile">⇅ Файл</button>
    <button class="iconbtn ghost" id="btnProjects">📁 Мої</button>
    <button class="iconbtn ghost" id="btnNew">＋ Нова</button>
  </div>
</div>
<input type="file" id="fileImportInput" accept=".json,application/json" style="display:none;">

<div id="workspace">
  <div id="palette"></div>

  <div id="canvasWrap">
    <div id="statusBar"><span id="statusText"></span><button id="statusCancel">✕</button></div>
    <div id="legendPanel">
      <button id="legendToggle" title="Легенда">ℹ️</button>
      <div id="legendBody"></div>
    </div>
    <svg id="board" viewBox="0 0 1700 1100" width="100%" preserveAspectRatio="xMinYMin meet">
      <defs>
        <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
          <path d="M36 0H0V36" fill="none" stroke="#141c25" stroke-width="1"/>
        </pattern>
        <pattern id="gridMajor" width="180" height="180" patternUnits="userSpaceOnUse">
          <rect width="180" height="180" fill="url(#grid)"/>
          <path d="M180 0H0V180" fill="none" stroke="#1b2630" stroke-width="1.2"/>
        </pattern>
      </defs>
      <rect id="bgRect" x="0" y="0" width="1700" height="1100" fill="url(#gridMajor)"></rect>
      <text id="emptyHintSvg" x="850" y="550" text-anchor="middle" fill="#5b6b78" font-size="20" font-family="DM Sans">Натисни прилад зліва, потім торкнись полотна, щоб розмістити</text>
      <g id="nodesLayer"></g>
      <g id="wiresLayer"></g>
      <g id="handlesLayer"></g>
    </svg>
  </div>

  <div id="inspector">
    <div id="inspHead"><div class="title" id="inspTitle">Прилад</div><button class="iconbtn ghost" id="inspClose">✕ Закрити</button></div>
    <div id="inspBody"></div>
  </div>
</div>

<div id="toolbar">
  <button class="tbtn active" data-tool="select" id="tSelect">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 3l5.5 16 2-6.5L19 10 5 3z" fill="currentColor"/></svg>
    Вибір
  </button>
  <button class="tbtn" id="tCable">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="5" cy="6" r="2.4" stroke="currentColor" stroke-width="1.6"/><circle cx="19" cy="18" r="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M7 7l10 10" stroke="currentColor" stroke-width="1.6"/></svg>
    Кабель
  </button>
  <button class="tbtn" id="tText">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 5h14M12 5v14" stroke="currentColor" stroke-width="1.8"/></svg>
    Текст
  </button>
  <button class="tbtn danger-tone" id="tDelete" disabled>
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.7"/></svg>
    Видал.
  </button>
  <button class="tbtn" id="tUndo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M7 7L3 11l4 4M3 11h11a6 6 0 010 12h-2" stroke="currentColor" stroke-width="1.7" fill="none"/></svg>
    Назад
  </button>
  <button class="tbtn" id="tZoomOut">－<span></span></button>
  <div id="zoomLbl">100%</div>
  <button class="tbtn" id="tZoomIn">＋<span></span></button>
  <button class="tbtn" id="tFit">⤢<span></span>Вид</button>
  <button class="tbtn" id="tPdf">
    <svg viewBox="0 0 24 24" fill="none"><path d="M6 2h9l5 5v15H6V2z" stroke="currentColor" stroke-width="1.6"/><path d="M9 13h6M9 16h6M9 10h2" stroke="currentColor" stroke-width="1.6"/></svg>
    PDF
  </button>
  <button class="tbtn" id="tHelp">？<span></span>Допом.</button>
</div>

<div id="modalLayer"><div class="modalCard" id="modalCard"></div></div>
<div id="toast"></div>

<script>
(function(){
"use strict";

/* ============== DATA / CONFIG ============== */
const WIRE_COLORS = [
  {key:'red',    hex:'#e3402f', label:'R · 24В'},
  {key:'white',  hex:'#f3f1ea', label:'W · Нагрів'},
  {key:'yellow', hex:'#f4c430', label:'Y · Холод'},
  {key:'green',  hex:'#3f9142', label:'G · Вент.'},
  {key:'blue',   hex:'#2f6fb0', label:'C · Спільн.'},
  {key:'brown',  hex:'#7a4a26', label:'Зона/2-й ст.'},
  {key:'orange', hex:'#e07b29', label:'O/B · Реверс'},
  {key:'black',  hex:'#2b2f33', label:'Допом.'}
];

const TYPE_INFO = {
  furnace:      {abbr:'ПІЧ', label:'Піч / повітронагрівач', accent:'#ff8a4c', shape:'rect',   w:96,h:64},
  ac:           {abbr:'AC',  label:'Кондиціонер (AC)',       accent:'#4fd1ff', shape:'rect',   w:96,h:64},
  coil:         {abbr:'КОЙЛ',label:'Койл (Coil)',            accent:'#4fd1ff', shape:'rect',   w:84,h:56},
  thermostat:   {abbr:'T',   label:'Термостат',              accent:'#e9eef3', shape:'circle', w:66,h:66},
  zoneboard:    {abbr:'ZB',  label:'Зонна коробка',          accent:'#b07bff', shape:'hex',    w:104,h:74},
  damper:       {abbr:'DMP', label:'Демпфер',                accent:'#2bd1a0', shape:'rectRot',w:74,h:42},
  humidifier:   {abbr:'HUM', label:'Зволожувач',             accent:'#4fd1ff', shape:'diamond',w:66,h:66},
  humidistat:   {abbr:'HSTAT',label:'Гумідистат',            accent:'#ff6f91', shape:'circle', w:54,h:54},
  relay:        {abbr:'REL', label:'Реле зволожувача',       accent:'#ffd24f', shape:'rect',   w:58,h:58},
  transformer:  {abbr:'TR',  label:'Трансформатор',          accent:'#ffd24f', shape:'triangle',w:66,h:66},
  sensor:       {abbr:'S',   label:'Сенсор зони',            accent:'#5fd96a', shape:'circle', w:42,h:42},
  outdoorsensor:{abbr:'OAS', label:'Сенсор зовн. повітря',   accent:'#5fe0e0', shape:'circleDash',w:42,h:42},
  board:        {abbr:'ПЛАТА',label:'Плата з клемами',       accent:'#9bd17f', shape:'board',  w:140,h:70},
  custom:       {abbr:'?',   label:'Свій блок',              accent:'#9aa7b3', shape:'rectDash',w:92,h:60},
  note:         {abbr:'',    label:'',                       accent:'#9aa7b3', shape:'none',   w:140,h:28}
};
// type keys that ship with the app — used to know which TYPE_INFO entries are user-added custom ones
const BUILTIN_TYPE_KEYS = Object.keys(TYPE_INFO);

const PALETTE_GROUPS = [
  {title:'Обладнання', items:['furnace','ac','coil']},
  {title:'Контроль',   items:['thermostat','zoneboard','transformer','relay','humidistat']},
  {title:'Сенсори',    items:['sensor','outdoorsensor']},
  {title:'Плати',      items:['board']},
  {title:'Інше',       items:['humidifier','damper','custom']}
];

/* ============== STATE ============== */
let state = null;          // current project {id,name,nodes,wires}
let history = [];
let tool = 'select';
let selectedId = null;     // currently selected node/wire id
let selectedKind = null;   // 'node' | 'wire'
let pendingCable = null;   // {colors:[{hex,label}]}
let pendingFromId = null;
let pendingFromTerm = null; // terminal index on a 'board' node, if connection started from a specific pin
let customTypes = [];      // user-added equipment types, persisted globally: {key,abbr,label,accent,shape,w,h}
let dragCtx = null;        // active pointer drag info
let zoomIdx = 2;
const ZOOM_STEPS = [60,80,100,130,160,200,260];
let saveTimer = null;

const board = document.getElementById('board');
const nodesLayer = document.getElementById('nodesLayer');
const wiresLayer = document.getElementById('wiresLayer');
const handlesLayer = document.getElementById('handlesLayer');
const canvasWrap = document.getElementById('canvasWrap');
const emptyHintSvg = document.getElementById('emptyHintSvg');
const statusBar = document.getElementById('statusBar');
const statusText = document.getElementById('statusText');

/* ============== STORAGE ABSTRACTION (works inside Claude.ai preview AND once deployed on the real site) ============== */
const Store = {
  async get(key){
    try{
      if(window.storage && window.storage.get){
        const r = await window.storage.get(key,false);
        return r ? r.value : null;
      }
    }catch(e){}
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  },
  async set(key, value){
    try{
      if(window.storage && window.storage.set){
        await window.storage.set(key, value, false);
        return true;
      }
    }catch(e){}
    try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
  },
  async del(key){
    try{ if(window.storage && window.storage.delete){ await window.storage.delete(key,false); } }catch(e){}
    try{ localStorage.removeItem(key); }catch(e){}
  }
};

/* ============== DISTINCT COLOR GENERATOR (for user-added equipment) ============== */
function hexToHue(hex){
  let r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b); let h=0;
  if(max!==min){
    const d=max-min;
    if(max===r) h=((g-b)/d)%6; else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4;
    h*=60; if(h<0) h+=360;
  }
  return h;
}
function hslToHex(h,s,l){
  s/=100; l/=100;
  const c=(1-Math.abs(2*l-1))*s, x=c*(1-Math.abs((h/60)%2-1)), m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  const toHex=v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#'+toHex(r)+toHex(g)+toHex(b);
}
function hueDist(a,b){ const d=Math.abs(a-b)%360; return d>180? 360-d : d; }
function nextDistinctColor(){
  const used = Object.values(TYPE_INFO).map(t=>hexToHue(t.accent)).concat(customTypes.map(c=>hexToHue(c.accent)));
  let best=null, bestScore=-1;
  for(let i=0;i<36;i++){
    const hue = (i*137.508 + 17) % 360; // golden-angle spread = maximally even coverage
    const score = used.length? Math.min(...used.map(u=>hueDist(hue,u))) : 999;
    if(score>bestScore){ bestScore=score; best=hue; }
  }
  return hslToHex(best, 64, 56);
}

const CUSTOM_SHAPES = [

];

function registerCustomType(label, shapeKey){
  const key = 'custom_'+uid();
  const accent = nextDistinctColor();
  const abbr = (label.trim().slice(0,5) || 'НОВ').toUpperCase();
  const entry = {key, abbr, label: label.trim()||'Новий елемент', accent, shape:shapeKey||'rect', w:84, h:60};
  TYPE_INFO[key] = {abbr:entry.abbr, label:entry.label, accent:entry.accent, shape:entry.shape, w:entry.w, h:entry.h};
  customTypes.push(entry);
  saveCustomTypes();
  buildPalette();
  return key;
}
async function saveCustomTypes(){
  try{ await Store.set('frosthawk-wiring-customtypes', JSON.stringify(customTypes)); }catch(e){}
}
async function loadCustomTypes(){
  try{
    const raw = await Store.get('frosthawk-wiring-customtypes');
    customTypes = raw? JSON.parse(raw) : [];
    customTypes.forEach(c=>{ TYPE_INFO[c.key] = {abbr:c.abbr, label:c.label, accent:c.accent, shape:c.shape, w:c.w, h:c.h}; });
  }catch(e){ customTypes=[]; }
}

/* ============== UNDO ============== */
function pushHistory(){
  history.push(JSON.stringify({nodes:state.nodes, wires:state.wires}));

}
function undo(){
  if(!history.length){ toast('Нічого скасовувати'); return; }

  return pts.join(' ');
}

let pendingPlaceType=null;

/* ============== NODE RENDERING ============== */
function nodeDims(node){
  const info = TYPE_INFO[node.type];
  let baseW, baseH;
  if(node.type==='board'){
    const n = (node.terminals||[]).length || 1;
    baseW = Math.max(120, n*34+20); baseH = 70;
  } else {
    baseW = info.w; baseH = info.h;
  }
  // nodeW/nodeH override the base dimensions independently (free resize).
  // Fall back to old uniform scale for backwards compatibility with saved diagrams.
  const sc = node.scale || 1;
  const w = node.nodeW != null ? node.nodeW : baseW * sc;
  const h = node.nodeH != null ? node.nodeH : baseH * sc;
  return {w: Math.max(24, w), h: Math.max(18, h), baseW, baseH};
}

function nodeShapeMarkup(node){
  const info = TYPE_INFO[node.type];
  const {w,h} = nodeDims(node);
  const c = info.accent;
  switch(info.shape){
    case 'circle':
      return `<circle class="node-shape" r="${w/2}" fill="${c}" stroke="#04222b" />`;
    case 'circleDash':
      return `<circle class="node-shape" r="${w/2}" fill="${shade(c,0.12)}" stroke="${c}" stroke-dasharray="4,3"/>`;
    case 'hex':
      return `<polygon class="node-shape" points="${hexPoints(w/2,h/2)}" fill="${c}" stroke="#04222b"/>`;
    case 'diamond':
      return `<polygon class="node-shape" points="0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0" fill="${c}" stroke="#04222b"/>`;
    case 'triangle':
      return `<polygon class="node-shape" points="0,${-h/2} ${w/2},${h/2} ${-w/2},${h/2}" fill="${c}" stroke="#04222b"/>`;
    case 'rectRot':
      return `<rect class="node-shape" x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="5" fill="${c}" stroke="#04222b" transform="rotate(18)"/>`;
    case 'rectDash':
      return `<rect class="node-shape" x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="8" fill="${shade(c,0.12)}" stroke="${c}" stroke-dasharray="5,4"/>`;
    case 'none':
      return '';
    default:
      return `<rect class="node-shape" x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="8" fill="${c}" stroke="#04222b"/>`;
  }
}
function shade(hex, alpha){
  return hex; // accent fill used directly; dashed shapes use accent at full sat for stroke + same for fill (kept simple/legible)
}

function terminalPoint(node, idx){
  const {w,h} = nodeDims(node);
  const terms = node.terminals||[];
  const n = terms.length||1;
  const spacing = w/(n+1);
  const lx = -w/2 + spacing*(idx+1);
  const ly = h/2;
  const rad = ((node.rotation||0)*Math.PI)/180;
  if(rad){ const wp = rotatePt(lx,ly,rad); return {x:node.x+wp.x, y:node.y+wp.y}; }
  return {x: node.x+lx, y: node.y+ly};
}

function boardMarkup(node){
  const info = TYPE_INFO[node.type];
  const {w,h,scale} = nodeDims(node);
  const terms = node.terminals||[];
  let pins = '';
  const pw=18*scale, ph=14*scale, fs=(8.6*scale).toFixed(1);
  terms.forEach((label,i)=>{
    const lx = -w/2 + (w/(terms.length+1))*(i+1);
    pins += `<g class="terminal" data-idx="${i}">
      <rect x="${lx-pw/2}" y="${h/2-6*scale}" width="${pw}" height="${ph}" rx="2" fill="#1a2128" stroke="${info.accent}" stroke-width="1.4"></rect>
      <text x="${lx}" y="${h/2+4*scale}" text-anchor="middle" font-size="${fs}" font-family="DM Sans" font-weight="700" fill="#cfe0ea" pointer-events="none">${escapeXml(label||'·')}</text>
    </g>`;
  });
  return `<rect class="node-shape" x="${-w/2}" y="${-h/2}" width="${w}" height="${h}" rx="6" fill="#161d27" stroke="${info.accent}" stroke-width="2"></rect>
    <rect x="${-w/2+6}" y="${-h/2+6}" width="${w-12}" height="14" rx="3" fill="${info.accent}" opacity="0.18"></rect>
    ${pins}`;
}

function nodeInnerMarkup(node){
  const info = TYPE_INFO[node.type];
  const {w,h,scale} = nodeDims(node);
  const abbrSize = (13*scale).toFixed(1);
  if(node.type==='note'){
    return `
      <rect x="${-w/2}" y="-14" width="${w}" height="28" rx="6" fill="#0a0e13" stroke="#2a3440" stroke-dasharray="3,3" opacity=".85"></rect>
      <text x="0" y="4" text-anchor="middle" font-size="${(12.5*scale).toFixed(1)}" font-family="DM Sans" fill="#cfe0ea">${escapeXml(node.label||'Текст…')}</text>
    `;
  } else if(node.type==='board'){
    return boardMarkup(node) +
      `<text class="node-abbr" y="${-h/2+22}" style="fill:#e9eef3;font-size:${abbrSize}px;">${escapeXml(truncate(node.label||info.abbr,18))}</text>`;
  } else {
    return nodeShapeMarkup(node) +
      `<text class="node-abbr" style="font-size:${abbrSize}px;">${info.abbr}</text>`;
  }
}

function buildNodeEl(node){
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','node'+(selectedKind==='node'&&selectedId===node.id?' selected':''));
  g.setAttribute('transform', nodeTransform(node));
  g.dataset.id = node.id;
  g.innerHTML = nodeInnerMarkup(node);
  attachNodeEvents(g, node);
  if(node.type==='board'){
    g.querySelectorAll('.terminal').forEach(t=>attachTerminalEvents(t, node, parseInt(t.dataset.idx,10)));
  }
  return g;
}

function truncate(s,n){ return s.length>n? s.slice(0,n-1)+'…' : s; }
function escapeXml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Lightweight in-place redraw — used while live-resizing, so we never destroy
// the node's <g> mid-gesture (that would drop pointer capture, same issue drag had).
function updateNodeEl(node){
  const el = nodesLayer.querySelector('.node[data-id="'+node.id+'"]');
  if(!el) return;
  el.innerHTML = nodeInnerMarkup(node);
  if(node.type==='board'){
    el.querySelectorAll('.terminal').forEach(t=>attachTerminalEvents(t, node, parseInt(t.dataset.idx,10)));
  }
}

/* ============== SVG POINT HELPERS ============== */
function svgPoint(evt){
  const pt = board.createSVGPoint();
  pt.x = evt.clientX; pt.y = evt.clientY;
  const ctm = board.getScreenCTM();
  if(!ctm) return {x:0,y:0};
  const loc = pt.matrixTransform(ctm.inverse());
  return {x:loc.x, y:loc.y};
}

function nodeRadii(node){
  const {w,h} = nodeDims(node);
  return {rx: w/2 + 7, ry: h/2 + 7};
}
function rotatePt(lx,ly,rad){
  return {x: lx*Math.cos(rad)-ly*Math.sin(rad), y: lx*Math.sin(rad)+ly*Math.cos(rad)};
}
function nodeTransform(node){
  return `translate(${node.x},${node.y}) rotate(${node.rotation||0})`;
}
function pointOnBoundary(node, towardX, towardY){
  const {rx,ry} = nodeRadii(node);
  let dx = towardX-node.x, dy = towardY-node.y;
  if(Math.abs(dx)<0.001 && Math.abs(dy)<0.001){ dx=1; dy=0; }
  const rad = ((node.rotation||0)*Math.PI)/180;
  if(rad){
    // work out the boundary in the node's own (unrotated) frame, then rotate the result back
    const loc = rotatePt(dx,dy,-rad);
    dx = loc.x; dy = loc.y;
  }
  const denom = Math.sqrt((dx*dx)/(rx*rx)+(dy*dy)/(ry*ry)) || 1;
  const t = 1/denom;
  let px = dx*t, py = dy*t;
  if(rad){ const w = rotatePt(px,py,rad); px=w.x; py=w.y; }
  return {x:node.x+px, y:node.y+py};
}

/* ============== NODE INTERACTION (drag / tap) ============== */
function attachNodeEvents(g, node){
  g.addEventListener('pointerdown', (e)=>{
    e.stopPropagation();
    if(tool==='connect-from'){
      pendingFromId = node.id; pendingFromTerm=null; tool='connect-to';
      setStatus('Тепер торкнись приладу-призначення (2/2)');
      return;
    }
    if(tool==='connect-to'){
      if(node.id===pendingFromId && pendingFromTerm==null){ toast('Обери інший прилад'); return; }
      createCable(pendingFromId, node.id, pendingFromTerm, null);
      cancelMode();
      return;
    }
    if(tool!=='select') return;
    g.setPointerCapture(e.pointerId);
    const start = svgPoint(e);
    dragCtx = {type:'node', id:node.id, startX:start.x, startY:start.y, ox:node.x, oy:node.y, moved:false, pointerId:e.pointerId};
    const mv = (ev)=>{
      const p = svgPoint(ev);
      const dx=p.x-dragCtx.startX, dy=p.y-dragCtx.startY;
      if(!dragCtx.moved && Math.hypot(dx,dy)>4){
        dragCtx.moved=true;
        pushHistory(); // snapshot BEFORE the move, so Undo restores the pre-drag spot
      }
      if(dragCtx.moved){
        node.x = dragCtx.ox+dx; node.y = dragCtx.oy+dy;
        // move just this node + its wires directly — NOT a full render() — so we
        // never destroy the element mid-drag (that would drop pointer capture).
        g.setAttribute('transform', nodeTransform(node));
        refreshWiresFor(node.id);
        buildHandles(); // cheap (handlesLayer only ever holds a couple of small shapes) and keeps any visible resize/rotate/wire handles in sync
      }
    };
    const up = (ev)=>{
      g.removeEventListener('pointermove', mv);
      g.removeEventListener('pointerup', up);
      g.removeEventListener('pointercancel', up);
      if(dragCtx.moved){ saveDebounced(); render(); }
      else { selectNode(node.id); }
      dragCtx=null;
    };
    g.addEventListener('pointermove', mv);
    g.addEventListener('pointerup', up);
    g.addEventListener('pointercancel', up);
  });
}

function attachTerminalEvents(termEl, node, idx){
  termEl.addEventListener('pointerdown', (e)=>{
    if(tool==='connect-from'){
      e.stopPropagation();
      pendingFromId = node.id; pendingFromTerm = idx; tool='connect-to';
      setStatus('Тепер торкнись приладу-призначення (2/2)');
      return;
    }
    if(tool==='connect-to'){
      e.stopPropagation();
      if(node.id===pendingFromId && pendingFromTerm===idx){ toast('Обери іншу клему'); return; }
      createCable(pendingFromId, node.id, pendingFromTerm, idx);
      cancelMode();
      return;
    }
    // in select mode let the event bubble up to the node's own handler (select / drag)
  });
}

/* ============== WIRE GEOMETRY ============== */
function rawEnd(wire, end){
  const id = wire[end+'Id'];
  if(id){
    const n = getNode(id);
    if(!n) return null;
    const term = wire[end+'Term'];
    if(n.type==='board' && term!=null && n.terminals && n.terminals[term]!=null){
      const tp = terminalPoint(n, term);
      return {x:tp.x, y:tp.y, node:n, isTerminal:true};
    }
    return {x:n.x,y:n.y,node:n};
  }
  const p = wire[end+'Point'];
  return p? {x:p.x,y:p.y,node:null} : null;
}

function computeGeom(wire){
  const fromRaw = rawEnd(wire,'from');
  const toRaw = rawEnd(wire,'to');
  if(!fromRaw || !toRaw) return null;
  const bend = wire.bend;
  const dirForFrom = bend || toRaw;
  const dirForTo = bend || fromRaw;
  let p1 = fromRaw.isTerminal ? {x:fromRaw.x,y:fromRaw.y} : (fromRaw.node ? pointOnBoundary(fromRaw.node, dirForFrom.x, dirForFrom.y) : {x:fromRaw.x,y:fromRaw.y});
  let p2 = toRaw.isTerminal ? {x:toRaw.x,y:toRaw.y} : (toRaw.node ? pointOnBoundary(toRaw.node, dirForTo.x, dirForTo.y) : {x:toRaw.x,y:toRaw.y});
  let off=0;
  if(!bend && wire.fromId && wire.toId && !fromRaw.isTerminal && !toRaw.isTerminal){
    const sibs = state.wires.filter(w=>w.fromId===wire.fromId && w.toId===wire.toId && !w.bend && w.fromTerm==null && w.toTerm==null);
    const idx = sibs.findIndex(w=>w.id===wire.id);
    const n = sibs.length;
    off = (idx-(n-1)/2)*6.5;
  }
  if(off){
    const dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.hypot(dx,dy)||1;
    const nx=-dy/len, ny=dx/len;
    p1={x:p1.x+nx*off,y:p1.y+ny*off};
    p2={x:p2.x+nx*off,y:p2.y+ny*off};
  }
  return {p1,p2,bend, rawFrom:fromRaw, rawTo:toRaw};
}

function buildWireEl(wire){
  const geom = computeGeom(wire);
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  const isSel = selectedKind==='wire'&&selectedId===wire.id;
  g.setAttribute('class','wire'+(isSel?' selected':''));
  g.dataset.id = wire.id;
  if(!geom){ return g; }
  const d = wire.bend ? `M${geom.p1.x},${geom.p1.y} L${wire.bend.x},${wire.bend.y} L${geom.p2.x},${geom.p2.y}`
                       : `M${geom.p1.x},${geom.p1.y} L${geom.p2.x},${geom.p2.y}`;
  const selStroke = isSel ? 'var(--ice)' : 'transparent';
  const mid = wire.bend ? wire.bend : {x:(geom.p1.x+geom.p2.x)/2, y:(geom.p1.y+geom.p2.y)/2};
  // labels stay hidden by default (they cluttered the canvas) — only the
  // currently-selected wire shows its label, as a quick confirmation while editing.
  const lblText = isSel ? (wire.label||'') : '';
  const lblW = Math.max(18, lblText.length*6.4+10);
  g.innerHTML = `
    <path d="${d}" fill="none" stroke="${selStroke}" stroke-width="9" opacity="${isSel?0.35:0}"></path>
    <path d="${d}" fill="none" stroke="#000" stroke-width="5.4" opacity="0.45" stroke-linecap="round" stroke-linejoin="round"></path>
    <path d="${d}" fill="none" stroke="${wire.color}" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"></path>
    <path class="wirehit" d="${d}" fill="none" stroke="transparent" stroke-width="20"></path>
    ${lblText? `<rect class="wire-label-bg" x="${mid.x-lblW/2}" y="${mid.y-9}" width="${lblW}" height="16" rx="4"></rect>
    <text class="wire-label" x="${mid.x}" y="${mid.y+3}" text-anchor="middle">${escapeXml(lblText)}</text>`:''}
  `;
  attachWireEvents(g, wire);
  return g;
}

function attachWireEvents(g, wire){
  g.addEventListener('pointerdown',(e)=>{
    if(tool!=='select') return;
    e.stopPropagation();
    selectWire(wire.id);
  });
}

// Lightweight in-place update used while dragging — avoids destroying/rebuilding
// DOM elements mid-gesture (which would kill pointer capture and feel "laggy").
function updateWireEl(wire){
  const el = wiresLayer.querySelector('.wire[data-id="'+wire.id+'"]');
  if(!el) return;
  const geom = computeGeom(wire);
  if(!geom) return;
  const d = wire.bend ? `M${geom.p1.x},${geom.p1.y} L${wire.bend.x},${wire.bend.y} L${geom.p2.x},${geom.p2.y}`
                       : `M${geom.p1.x},${geom.p1.y} L${geom.p2.x},${geom.p2.y}`;
  el.querySelectorAll('path').forEach(p=>p.setAttribute('d', d));
  const mid = wire.bend ? wire.bend : {x:(geom.p1.x+geom.p2.x)/2, y:(geom.p1.y+geom.p2.y)/2};
  const lblBg = el.querySelector('.wire-label-bg');
  const lblTxt = el.querySelector('.wire-label');
  if(lblBg && lblTxt){
    const lblText = wire.label||'';
    const lblW = Math.max(18, lblText.length*6.4+10);
    lblBg.setAttribute('x', mid.x-lblW/2); lblBg.setAttribute('y', mid.y-9); lblBg.setAttribute('width', lblW);
    lblTxt.setAttribute('x', mid.x); lblTxt.setAttribute('y', mid.y+3);
  }
}
function refreshWiresFor(nodeId){
  state.wires.forEach(w=>{ if(w.fromId===nodeId || w.toId===nodeId) updateWireEl(w); });
}

/* ============== HANDLES (endpoint + bend dragging for selected wire, resize for selected node) ============== */
function buildHandles(){
  handlesLayer.innerHTML='';
  if(selectedKind==='node'){
    const node = getNode(selectedId);
    if(node){ makeResizeHandle(node); makeRotateHandle(node); }
    return;
  }
  if(selectedKind!=='wire') return;
  const wire = getWire(selectedId);
  if(!wire) return;
  const geom = computeGeom(wire);
  if(!geom) return;

  makeHandle(geom.p1.x, geom.p1.y, '#4fd1ff', wire, 'from', (nx,ny,hit)=>{
    if(hit){ wire.fromId=hit.node.id; delete wire.fromPoint; wire.fromTerm = hit.term!=null? hit.term : null; }
    else { wire.fromId=null; wire.fromPoint={x:nx,y:ny}; wire.fromTerm=null; }
    wire.bend=null;
  });
  makeHandle(geom.p2.x, geom.p2.y, '#ff8a4c', wire, 'to', (nx,ny,hit)=>{
    if(hit){ wire.toId=hit.node.id; delete wire.toPoint; wire.toTerm = hit.term!=null? hit.term : null; }
    else { wire.toId=null; wire.toPoint={x:nx,y:ny}; wire.toTerm=null; }
    wire.bend=null;
  });
  // bend handle (midpoint) - drag to create/move a kink
  const mid = wire.bend || {x:(geom.p1.x+geom.p2.x)/2, y:(geom.p1.y+geom.p2.y)/2};
  makeHandle(mid.x, mid.y, '#ffd24f', wire, 'bend', (nx,ny)=>{ wire.bend = {x:nx,y:ny}; }, true);
}

function makeHandle(x,y,color,wire,endKey,onDrop,isBend){
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r', isBend?9:13);
  c.setAttribute('fill', color); c.setAttribute('stroke','#04222b'); c.setAttribute('stroke-width','2');
  c.setAttribute('class','handle'); c.style.cursor='grab';
  handlesLayer.appendChild(c);
  c.addEventListener('pointerdown',(e)=>{
    e.stopPropagation();
    c.setPointerCapture(e.pointerId);
    pushHistory(); // snapshot BEFORE this drag's mutation, for correct undo
    // remember the committed endpoint state so we can restore it before the real (snapped) commit on release
    const orig = {fromId:wire.fromId, fromPoint:wire.fromPoint, fromTerm:wire.fromTerm,
                  toId:wire.toId, toPoint:wire.toPoint, toTerm:wire.toTerm, bend:wire.bend};
    const mv=(ev)=>{
      const p = svgPoint(ev);
      c.setAttribute('cx',p.x); c.setAttribute('cy',p.y);
      // live preview: let the wire itself visually stretch to follow the finger, not just the dot
      if(endKey==='from'){ wire.fromId=null; wire.fromPoint={x:p.x,y:p.y}; wire.fromTerm=null; }
      else if(endKey==='to'){ wire.toId=null; wire.toPoint={x:p.x,y:p.y}; wire.toTerm=null; }
      else { wire.bend = {x:p.x,y:p.y}; }
      updateWireEl(wire);
    };
    const up=(ev)=>{
      c.removeEventListener('pointermove',mv);
      c.removeEventListener('pointerup',up);
      // restore the pre-drag state, then apply the real commit (with node/terminal snapping)
      wire.fromId=orig.fromId; wire.fromPoint=orig.fromPoint; wire.fromTerm=orig.fromTerm;
      wire.toId=orig.toId; wire.toPoint=orig.toPoint; wire.toTerm=orig.toTerm; wire.bend=orig.bend;
      const p = svgPoint(ev);
      const hit = endKey==='bend'? null : findNodeNear(p.x,p.y);
      onDrop(p.x,p.y,hit);
      render(); saveDebounced();
    };
    c.addEventListener('pointermove',mv);
    c.addEventListener('pointerup',up);
  });
}

// Corner handle — drag outward/inward to scale the element up or down, live.
// Creates 4 edge-midpoint handles (right, bottom, left, top).
// Dragging right/left changes width only; dragging top/bottom changes height only.
// All maths are done in the node's local (unrotated) frame, then projected back.
function makeResizeHandle(node){
  const rad = ()=>((node.rotation||0)*Math.PI)/180;

  // edge definitions: {axis:'w'|'h', sign:+1|-1, localOffset:fn→{lx,ly}}
  const edges = [
    { axis:'w', sign: 1, local:()=>{ const {w,h}=nodeDims(node); return { lx: w/2,   ly: 0       }; }, icon:'⇔', color:'#4fd1ff' },
    { axis:'h', sign: 1, local:()=>{ const {w,h}=nodeDims(node); return { lx: 0,     ly: h/2     }; }, icon:'⇕', color:'#4fd1ff' },
    { axis:'w', sign:-1, local:()=>{ const {w,h}=nodeDims(node); return { lx:-w/2,   ly: 0       }; }, icon:'⇔', color:'#4fd1ff' },
    { axis:'h', sign:-1, local:()=>{ const {w,h}=nodeDims(node); return { lx: 0,     ly:-h/2     }; }, icon:'⇕', color:'#4fd1ff' },
  ];

  // init nodeW/nodeH from current dims so first drag starts from actual size
  if(node.nodeW == null){ const d=nodeDims(node); node.nodeW=d.w; node.nodeH=d.h; }

  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','12');
  lbl.setAttribute('font-family','DM Sans'); lbl.setAttribute('font-weight','700');
  lbl.setAttribute('fill','#4fd1ff'); lbl.setAttribute('pointer-events','none');
  lbl.style.display='none';
  handlesLayer.appendChild(lbl);

  edges.forEach(edge=>{
    const R=14;
    function screenPos(){
      const loc=edge.local();
      const wp=rotatePt(loc.lx, loc.ly, rad());
      return {x:node.x+wp.x, y:node.y+wp.y};
    }
    let sp=screenPos();

    const hit=document.createElementNS('http://www.w3.org/2000/svg','circle');
    hit.setAttribute('cx',sp.x); hit.setAttribute('cy',sp.y); hit.setAttribute('r',26);
    hit.setAttribute('fill','transparent'); hit.setAttribute('class','handle');
    handlesLayer.appendChild(hit);

    const pill=document.createElementNS('http://www.w3.org/2000/svg','circle');
    pill.setAttribute('cx',sp.x); pill.setAttribute('cy',sp.y); pill.setAttribute('r',R);
    pill.setAttribute('fill','#1c2d3a'); pill.setAttribute('stroke',edge.color); pill.setAttribute('stroke-width','2');
    pill.setAttribute('pointer-events','none');
    handlesLayer.appendChild(pill);

    const ico=document.createElementNS('http://www.w3.org/2000/svg','text');
    ico.setAttribute('text-anchor','middle'); ico.setAttribute('dominant-baseline','middle');
    ico.setAttribute('font-size','13'); ico.setAttribute('fill',edge.color);
    ico.setAttribute('pointer-events','none'); ico.setAttribute('font-weight','700');
    ico.textContent=edge.icon;
    ico.setAttribute('x',sp.x); ico.setAttribute('y',sp.y);
    handlesLayer.appendChild(ico);

    function reposition(){
      const np=screenPos();
      hit.setAttribute('cx',np.x); hit.setAttribute('cy',np.y);
      pill.setAttribute('cx',np.x); pill.setAttribute('cy',np.y);
      ico.setAttribute('x',np.x); ico.setAttribute('y',np.y);
    }

    hit.addEventListener('pointerdown',(e)=>{
      e.stopPropagation();
      hit.setPointerCapture(e.pointerId);
      pushHistory();
      const startP=svgPoint(e);
      const startW=node.nodeW; const startH=node.nodeH;
      // unit vector along this edge's axis in screen space
      const axisLocal = edge.axis==='w' ? {lx:edge.sign,ly:0} : {lx:0,ly:edge.sign};
      const axisScreen = rotatePt(axisLocal.lx, axisLocal.ly, rad());
      lbl.style.display='block';
      const mv=(ev)=>{
        const p=svgPoint(ev);
        const dx=p.x-startP.x, dy=p.y-startP.y;
        // project drag onto this edge's axis
        const delta=(dx*axisScreen.x + dy*axisScreen.y)*2; // *2 because we resize from centre
        if(edge.axis==='w') node.nodeW=Math.max(28, startW+delta);
        else                node.nodeH=Math.max(20, startH+delta);
        updateNodeEl(node); refreshWiresFor(node.id); reposition();
        const nsp=screenPos();
        lbl.setAttribute('x',nsp.x+20); lbl.setAttribute('y',nsp.y);
        lbl.textContent = edge.axis==='w'
          ? Math.round(node.nodeW)+'px'
          : Math.round(node.nodeH)+'px';
      };
      const up=()=>{
        hit.removeEventListener('pointermove',mv);
        hit.removeEventListener('pointerup',up);
        lbl.style.display='none';
        render(); saveDebounced();
      };
      hit.addEventListener('pointermove',mv);
      hit.addEventListener('pointerup',up);
    });
  });
}

function makeRotateHandle(node){
  const ARM = 44; // length of the arm from element edge to handle centre
  function pos(){
    const {h} = nodeDims(node);
    const rad = ((node.rotation||0)*Math.PI)/180;
    const edge = rotatePt(0,-h/2,rad);
    const tip  = rotatePt(0,-(h/2+ARM),rad);
    return {ex:node.x+edge.x, ey:node.y+edge.y, hx:node.x+tip.x, hy:node.y+tip.y};
  }
  let p0=pos();
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',p0.ex); line.setAttribute('y1',p0.ey);
  line.setAttribute('x2',p0.hx); line.setAttribute('y2',p0.hy);
  line.setAttribute('stroke','#ffd24f'); line.setAttribute('stroke-width','2');
  line.setAttribute('stroke-dasharray','4,3'); line.setAttribute('pointer-events','none');
  handlesLayer.appendChild(line);

  const R=20;
  const hit = document.createElementNS('http://www.w3.org/2000/svg','circle');
  hit.setAttribute('cx',p0.hx); hit.setAttribute('cy',p0.hy); hit.setAttribute('r',30);
  hit.setAttribute('fill','transparent'); hit.setAttribute('class','handle');
  handlesLayer.appendChild(hit);

  const pill = document.createElementNS('http://www.w3.org/2000/svg','circle');
  pill.setAttribute('cx',p0.hx); pill.setAttribute('cy',p0.hy); pill.setAttribute('r',R);
  pill.setAttribute('fill','#ffd24f'); pill.setAttribute('stroke','#04222b'); pill.setAttribute('stroke-width','1.8');
  pill.setAttribute('pointer-events','none');
  handlesLayer.appendChild(pill);

  const ico = document.createElementNS('http://www.w3.org/2000/svg','text');
  ico.setAttribute('text-anchor','middle'); ico.setAttribute('dominant-baseline','middle');
  ico.setAttribute('font-size','18'); ico.setAttribute('fill','#04222b');
  ico.setAttribute('pointer-events','none'); ico.setAttribute('font-weight','700');
  ico.textContent='↻';
  function setIcoPos(x,y){ ico.setAttribute('x',x); ico.setAttribute('y',y); }
  setIcoPos(p0.hx,p0.hy);
  handlesLayer.appendChild(ico);

  const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('font-size','13');
  lbl.setAttribute('font-family','DM Sans'); lbl.setAttribute('font-weight','700');
  lbl.setAttribute('fill','#ffd24f'); lbl.setAttribute('pointer-events','none');
  lbl.style.display='none';
  handlesLayer.appendChild(lbl);

  hit.addEventListener('pointerdown',(e)=>{
    e.stopPropagation();
    hit.setPointerCapture(e.pointerId);
    pushHistory();
    const sp=svgPoint(e);
    const startAngle=Math.atan2(sp.y-node.y,sp.x-node.x)*180/Math.PI;
    const startRot=node.rotation||0;
    const el=nodesLayer.querySelector('.node[data-id="'+node.id+'"]');
    lbl.style.display='block';
    const mv=(ev)=>{
      const p=svgPoint(ev);
      const ang=Math.atan2(p.y-node.y,p.x-node.x)*180/Math.PI;
      // snap to 15° steps while dragging, but allow free rotation by holding — snap feels right in practice
      let newRot=startRot+(ang-startAngle);
      newRot=((Math.round(newRot/15)*15)%360+360)%360;
      node.rotation=newRot;
      if(el) el.setAttribute('transform',nodeTransform(node));
      refreshWiresFor(node.id);
      const np=pos();
      line.setAttribute('x1',np.ex); line.setAttribute('y1',np.ey);
      line.setAttribute('x2',np.hx); line.setAttribute('y2',np.hy);
      hit.setAttribute('cx',np.hx); hit.setAttribute('cy',np.hy);
      pill.setAttribute('cx',np.hx); pill.setAttribute('cy',np.hy);
      setIcoPos(np.hx,np.hy);
      lbl.setAttribute('x',np.hx); lbl.setAttribute('y',np.hy-R-8);
      lbl.textContent=Math.round(node.rotation)+'°';
    };
    const up=()=>{
      hit.removeEventListener('pointermove',mv);
      hit.removeEventListener('pointerup',up);
      lbl.style.display='none';
      render(); saveDebounced();
    };
    hit.addEventListener('pointermove',mv);
    hit.addEventListener('pointerup',up);
  });
}

function findNodeNear(x,y){
  let best=null, bestD=Infinity;
  state.nodes.forEach(n=>{
    if(n.type==='note') return;
    const {w,h} = nodeDims(n);
    const r = Math.max(w,h)/2 + 18;
    const d = Math.hypot(n.x-x,n.y-y);
    if(d<r && d<bestD){ bestD=d; best=n; }
  });
  if(!best) return null;
  let term=null;
  if(best.type==='board' && best.terminals && best.terminals.length){
    let td=Infinity;
    best.terminals.forEach((t,i)=>{
      const tp = terminalPoint(best,i);
      const dd = Math.hypot(tp.x-x, tp.y-y);
      if(dd<td){ td=dd; term=i; }
    });
    if(td>28) term=null; // too far from any pin — connect to the board generically instead
  }
  return {node:best, term};
}

/* ============== SELECTION / INSPECTOR ============== */
function selectNode(id){ selectedKind='node'; selectedId=id; openInspectorNode(getNode(id)); render(); }
function selectWire(id){ selectedKind='wire'; selectedId=id; openInspectorWire(getWire(id)); render(); }
function clearSelection(){ selectedKind=null; selectedId=null; closeInspector(); render(); }

function renderTermRows(node){
  const wrap = document.getElementById('fTerms');
  if(!wrap) return;
  wrap.innerHTML = node.terminals.map((t,i)=>`
    <div class="row" data-i="${i}" style="margin-bottom:6px;">
      <input type="text" class="termInput" data-i="${i}" value="${escapeXml(t)}" style="flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 9px;font-size:13px;">
      <button class="termDel" data-i="${i}" style="background:transparent;border:none;color:var(--danger);font-size:16px;padding:4px 8px;">✕</button>
    </div>`).join('');
  wrap.querySelectorAll('.termInput').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      node.terminals[parseInt(inp.dataset.i,10)] = inp.value;
      renderNodesOnly(); renderWiresOnly(); saveDebounced();
    });
  });
  wrap.querySelectorAll('.termDel').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const i = parseInt(btn.dataset.i,10);
      pushHistory();
      node.terminals.splice(i,1);
      // wires pointing past the removed terminal shift down by one; wires pointing at the removed one detach
      state.wires.forEach(w=>{
        if(w.fromId===node.id && w.fromTerm!=null){
          if(w.fromTerm===i){ w.fromTerm=null; w.fromId=null; w.fromPoint={x:node.x,y:node.y}; }
          else if(w.fromTerm>i) w.fromTerm--;
        }
        if(w.toId===node.id && w.toTerm!=null){
          if(w.toTerm===i){ w.toTerm=null; w.toId=null; w.toPoint={x:node.x,y:node.y}; }
          else if(w.toTerm>i) w.toTerm--;
        }
      });
      render(); renderTermRows(node); saveDebounced();
    });
  });
}

function deleteNode(id){
  pushHistory();
  const n = getNode(id);
  // detach wires instead of destroying them — keep dangling end at last position
  state.wires.forEach(w=>{
    if(w.fromId===id){
      const p = (n.type==='board' && w.fromTerm!=null && n.terminals && n.terminals[w.fromTerm]!=null) ? terminalPoint(n,w.fromTerm) : {x:n.x,y:n.y};
      w.fromId=null; w.fromPoint=p; w.fromTerm=null;
    }
    if(w.toId===id){
      const p = (n.type==='board' && w.toTerm!=null && n.terminals && n.terminals[w.toTerm]!=null) ? terminalPoint(n,w.toTerm) : {x:n.x,y:n.y};
      w.toId=null; w.toPoint=p; w.toTerm=null;
    }
  });
  state.nodes = state.nodes.filter(x=>x.id!==id);
  clearSelection(); saveDebounced();
}
function deleteWire(id){
  pushHistory();
  state.wires = state.wires.filter(w=>w.id!==id);
  clearSelection(); saveDebounced();
}

function buildLegend(){
  const body = document.getElementById('legendBody');
  if(!body) return;
  const types = new Map(); // type key -> info
  state.nodes.forEach(n=>{
    if(n.type==='note') return;
    if(!types.has(n.type)) types.set(n.type, TYPE_INFO[n.type]);
  });
  const colors = new Map(); // hex -> label
  state.wires.forEach(w=>{ if(w.label) colors.set(w.color, w.label); });

  let html = '';
  if(types.size){
    html += `<div class="legendGroup"><div class="legendTitle">Обладнання</div>`;
    types.forEach(info=>{ html += `<div class="legendRow"><span class="legendSwatch" style="background:${info.accent}"></span>${escapeXml(info.label)}</div>`; });
    html += `</div>`;
  }
  if(colors.size){
    html += `<div class="legendGroup"><div class="legendTitle">Проводи</div>`;
    colors.forEach((label,hex)=>{ html += `<div class="legendRow"><span class="legendSwatch" style="background:${hex}"></span>${escapeXml(label)}</div>`; });
    html += `</div>`;
  }
  body.innerHTML = html || `<div class="legendEmpty">Тут з'явиться пояснення кольорів і приладів, коли почнеш будувати схему</div>`;
}

function safeFileSlug(s){
  return (s||'shema').toLowerCase().replace(/[^a-z0-9а-яіїєё]+/gi,'-').replace(/^-+|-+$/g,'') || 'shema';
}

function downloadProjectJson(){
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = safeFileSlug(state.name)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('Файл завантажено');
}

document.getElementById('fileImportInput').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.nodes) || !Array.isArray(data.wires)){ toast('Файл не схожий на схему'); return; }
      data.id = data.id || uid();
      state = data;
      document.getElementById('projName').value = state.name || 'Без назви';
      history=[]; selectedId=null; selectedKind=null; closeInspector();
      render();
      saveDebounced();
      toast('Схему відкрито');
    }catch(err){ toast('Не вдалося прочитати файл'); }
  };
  reader.readAsText(file);
});

const GITHUB_CFG_KEY = 'frosthawk-wiring-github-cfg';
async function loadGithubCfg(){
  try{ const raw = await Store.get(GITHUB_CFG_KEY); return raw? JSON.parse(raw) : null; }catch(e){ return null; }
}

async function saveToGithub(cfg){
  toast('Зберігаю на GitHub…');
  try{
    const path = (cfg.folder? cfg.folder.replace(/^\/+|\/+$/g,'')+'/' : '') + safeFileSlug(state.name) + '.json';
    const apiUrl = `https://api.github.com/repos/${cfg.repo}/contents/${path}`;
    const headers = { 'Authorization': 'Bearer '+cfg.token, 'Accept': 'application/vnd.github+json' };
    let sha;
    const getRes = await fetch(apiUrl+`?ref=${encodeURIComponent(cfg.branch||'main')}`, {headers});
    if(getRes.status===200){ sha = (await getRes.json()).sha; }
    else if(getRes.status!==404){ throw new Error('Перевірка файлу: код '+getRes.status); }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
    const putRes = await fetch(apiUrl, {
      method:'PUT',
      headers: Object.assign({'Content-Type':'application/json'}, headers),
      body: JSON.stringify({
        message: 'Схема підключення: '+(state.name||'Без назви'),
        content, sha, branch: cfg.branch||'main'
      })
    });
    if(!putRes.ok){
      if(putRes.status===401) throw new Error('Невірний токен');
      if(putRes.status===404) throw new Error('Репозиторій/гілка не знайдені');
      throw new Error('Код '+putRes.status);
    }
    toast('Збережено на GitHub ✓');
  }catch(err){
    toast('Помилка GitHub: '+(err.message||'спробуй ще раз'));
  }
}

    <div class="miniHelp">Тримай копію поза браузером — щоб не загубилась і щоб відкрити на іншому пристрої.</div>
    <div class="btnrow" style="margin-bottom:16px;">
      <button class="btn" id="fmDownload">⬇ Завантажити .json</button>
      <button class="btn ghost" id="fmOpen">📂 Відкрити файл</button>
    </div>
    <div style="border-top:1px solid var(--line); padding-top:14px;">
      <h2 style="font-size:19px; margin-bottom:8px;">GitHub</h2>
      ${hasCfg ? `
        <div class="miniHelp">Репозиторій: <b>${escapeXml(cfg.repo)}</b> · гілка <b>${escapeXml(cfg.branch||'main')}</b> · папка <b>${escapeXml(cfg.folder||'wiring-diagrams')}</b></div>
        <button class="btn primary" id="fmPush" style="width:100%; margin-bottom:8px;">☁️ Зберегти цю схему на GitHub</button>
        <button class="btn ghost" id="fmCfgEdit" style="width:100%;">⚙️ Змінити налаштування</button>
      ` : `
        <div class="miniHelp">Введи дані одноразово. Токен зберігається тільки в цьому браузері й використовується напряму для звернень до GitHub — більше нікуди не передається.</div>
        ${fieldHtml('cfgToken','Personal Access Token','','ghp_…')}
        ${fieldHtml('cfgRepo','Репозиторій (власник/назва)','','frosthawk/frosthawkhvac.com')}
        ${fieldHtml('cfgBranch','Гілка','main','main')}
        ${fieldHtml('cfgFolder','Папка в репозиторії','wiring-diagrams','wiring-diagrams')}
        <button class="btn primary" id="fmCfgSave" style="width:100%;">Зберегти налаштування</button>
      `}
    </div>
  `);
  document.getElementById('fmDownload').addEventListener('click', ()=>{ downloadProjectJson(); closeModal(); });
  document.getElementById('fmOpen').addEventListener('click', ()=>{ closeModal(); document.getElementById('fileImportInput').click(); });
  if(hasCfg){
    document.getElementById('fmPush').addEventListener('click', async ()=>{ closeModal(); await saveToGithub(cfg); });
    document.getElementById('fmCfgEdit').addEventListener('click', async ()=>{ await Store.del(GITHUB_CFG_KEY); openFileModal(); });
  } else {
    document.getElementById('fmCfgSave').addEventListener('click', async ()=>{
      const newCfg = {
        token: document.getElementById('cfgToken').value.trim(),
        repo: document.getElementById('cfgRepo').value.trim().replace(/^https?:\/\/github\.com\//,'').replace(/\.git$/,''),
        branch: document.getElementById('cfgBranch').value.trim()||'main',
        folder: document.getElementById('cfgFolder').value.trim()||'wiring-diagrams'
      };
      if(!newCfg.token || !newCfg.repo.includes('/')){ toast('Заповни токен і репозиторій у форматі власник/назва'); return; }
      await Store.set(GITHUB_CFG_KEY, JSON.stringify(newCfg));
      toast('Налаштування збережено');
      openFileModal();
    });
  }
}
document.getElementById('btnFile').addEventListener('click', openFileModal);

document.getElementById('btnNew').addEventListener('click', ()=>{

    <h2>Нова схема</h2>
    <div class="miniHelp">Поточну схему вже збережено автоматично — її завжди можна відкрити через «Мої».</div>
    <div class="btnrow">

    </div>

document.getElementById('btnProjects').addEventListener('click', async ()=>{
  const idx = await loadIndex();
  const rows = idx.length? idx.sort((a,b)=>b.updatedAt-a.updatedAt).map(p=>`
    <div class="projRow" data-id="${p.id}">
      <div style="flex:1;">
        <div class="pname">${escapeXml(p.name)}</div>
        <div class="pdate">${new Date(p.updatedAt).toLocaleString('uk-UA')}</div>
      </div>
      <button class="openP" title="Відкрити">📂</button>
      <button class="del" title="Видалити">🗑</button>
    </div>
  `).join('') : `<div class="miniHelp">Поки що немає збережених схем.</div>`;
  openModal(`<h2>Мої схеми</h2><div class="projList">${rows}</div>`);
  modalCard.querySelectorAll('.openP').forEach(b=>{
    b.addEventListener('click', async (e)=>{
      const id = e.target.closest('.projRow').dataset.id;
      closeModal(); await loadProject(id);
    });
  });
  modalCard.querySelectorAll('.del').forEach(b=>{
    b.addEventListener('click', async (e)=>{
      const id = e.target.closest('.projRow').dataset.id;
      await Store.del(projKey(id));
      let list = await loadIndex();
      list = list.filter(p=>p.id!==id);
      await saveIndex(list);
      toast('Схему видалено');
      document.getElementById('btnProjects').click();
    });
  });
});

document.getElementById('projName').addEventListener('change', saveDebounced);
document.getElementById('projName').addEventListener('blur', saveDebounced);

/* ============== PDF EXPORT ============== */
async function exportPdf(){
  if(!state.nodes.length){ toast('Спочатку додай хоча б один прилад'); return; }
  toast('Готую PDF…');
  const svgEl = board;
  const bbox = nodesLayer.getBBox();
  const pad = 60;
  const x = Math.max(0, bbox.x-pad), y = Math.max(0, bbox.y-pad);
  const w = bbox.width + pad*2, h = bbox.height + pad*2 + 70;

  const clone = svgEl.cloneNode(true);
  clone.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
  clone.setAttribute('width', w);
  clone.setAttribute('height', h);
  clone.querySelectorAll('#bgRect').forEach(r=>{ r.setAttribute('fill', '#ffffff'); });
  clone.querySelectorAll('#emptyHintSvg').forEach(t=>t.remove());
  clone.querySelectorAll('.handle').forEach(hd=>hd.remove());
  clone.querySelectorAll('.node-label').forEach(t=>t.setAttribute('fill','#26313b'));
  clone.querySelectorAll('.wire-label').forEach(t=>t.setAttribute('fill','#1a2128'));
  clone.querySelectorAll('.wire-label-bg').forEach(r=>{ r.setAttribute('fill','#ffffff'); r.setAttribute('opacity','0.92'); r.setAttribute('stroke','#d9dee3'); });
  clone.querySelectorAll('.terminal rect').forEach(r=>{ r.setAttribute('fill','#ffffff'); });
  clone.querySelectorAll('.terminal text').forEach(t=>{ t.setAttribute('fill','#1a2128'); });

  // title block
  const titleG = document.createElementNS('http://www.w3.org/2000/svg','g');
  titleG.innerHTML = `<text x="${x+pad/2}" y="${y+34}" font-family="DM Sans" font-weight="700" font-size="22" fill="#11161d">${escapeXml(state.name)}</text>
    <text x="${x+pad/2}" y="${y+54}" font-family="DM Sans" font-size="12" fill="#5b6b78">Frost Hawk HVAC — ${new Date().toLocaleDateString('uk-UA')}</text>`;
  clone.appendChild(titleG);

  const xml = new XMLSerializer().serializeToString(clone);
  const svg64 = btoa(unescape(encodeURIComponent(xml)));
  const img = new Image();
  const scale = 2.2;
  await new Promise((resolve,reject)=>{
    img.onload = resolve; img.onerror = reject;
    img.src = 'data:image/svg+xml;base64,'+svg64;
  });
  const canvas = document.createElement('canvas');
  canvas.width = w*scale; canvas.height = h*scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  const dataUrl = canvas.toDataURL('image/png',1.0);

  const { jsPDF } = window.jspdf;
  const orientation = w>h ? 'landscape':'portrait';
  const doc = new jsPDF({orientation, unit:'pt', format:'a4'});
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 24;
  const availW = pageW-margin*2, availH = pageH-margin*2;
  const ratio = Math.min(availW/w, availH/h);
  const imgW = w*ratio, imgH = h*ratio;
  doc.addImage(dataUrl,'PNG', (pageW-imgW)/2, margin, imgW, imgH);

  // legend of distinct wire colors/labels used
  const seen = new Map();
  state.wires.forEach(wr=>{ if(wr.label) seen.set(wr.color+'|'+wr.label, wr); });
  if(seen.size){
    let ly = margin+imgH+20;
    if(ly > pageH-40){ doc.addPage(); ly = margin; }
    doc.setFontSize(10); doc.setTextColor(60,70,80);
    doc.text('Легенда проводів:', margin, ly);
    let lx = margin, col=0;
    [...seen.values()].forEach((wr,i)=>{
      const yy = ly+16+Math.floor(col/3)*16;
      const xx = margin + (col%3)*180;
      doc.setFillColor(wr.color);
      doc.circle(xx+4, yy-3, 4, 'F');
      doc.setTextColor(40,48,56);
      doc.text(wr.label, xx+14, yy);
      col++;
    });
  }

  doc.save((state.name||'shema').replace(/[^\wа-яіїєА-ЯІЇЄ \-]/g,'').trim()+'.pdf');
  toast('PDF готовий ✓');
}

/* ============== INIT ============== */
async function init(){
  await loadCustomTypes();
  buildPalette();
  setZoom(2);
  const lastId = await Store.get('frosthawk-wiring-last');
  if(lastId){
    const raw = await Store.get(projKey(lastId));
    if(raw){
      try{
        state = JSON.parse(raw);
        state.nodes = state.nodes||[]; state.wires = state.wires||[];
      }catch(e){ state = blankProject(); }
    } else { state = blankProject(); }
  } else {
    state = blankProject();
  }
  document.getElementById('projName').value = state.name;
  render();
  refreshToolButtons();
}
init();

})();
