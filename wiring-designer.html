<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Схеми — Frost Hawk HVAC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#09111a; --panel:#0f1922; --panel2:#16232f; --panel3:#1c2e3e;
  --line:#1e2f40; --ice:#4fd1ff; --ice2:#1a4d62; --ember:#ff8a4c;
  --text:#dde8f0; --dim:#6b8499; --danger:#ff5555; --good:#4fdc8f;
  --sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button,input,select{font-family:inherit;cursor:pointer}
h1,h2,.bb{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#topbar{
  flex:0 0 auto;display:flex;align-items:center;gap:6px;
  padding:6px 10px;background:var(--panel);border-bottom:1px solid var(--line);
  z-index:30;min-height:50px;
}
#topbar h1{font-size:18px;color:var(--ice);white-space:nowrap;flex:0 0 auto}
#projName{
  background:transparent;border:1px solid transparent;color:var(--text);
  font-size:13px;font-weight:600;padding:5px 6px;border-radius:7px;
  flex:1 1 auto;min-width:0;max-width:130px;
}
#projName:focus{border-color:var(--ice2);outline:none;background:var(--panel2)}
.ib{
  flex:0 0 auto;background:var(--panel2);border:1px solid var(--line);
  color:var(--text);border-radius:7px;padding:6px 9px;font-size:11px;
  font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:4px
}
.ib:active{opacity:.7}
.ib.ghost{background:transparent;border-color:transparent}
#saveDot{width:7px;height:7px;border-radius:50%;background:var(--good);flex:0 0 auto;transition:background .2s}
#saveDot.busy{background:var(--ember)}

/* ── WORKSPACE ── */
#workspace{flex:1 1 auto;display:flex;min-height:0;position:relative}

/* ── PALETTE ── */
#palette{
  flex:0 0 72px;background:var(--panel);border-right:1px solid var(--line);
  overflow-y:auto;overflow-x:hidden;padding:8px 4px;
}
.pg{margin-bottom:10px}
.pg-title{font-size:9px;color:var(--dim);font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;text-align:center;margin-bottom:4px;padding:0 2px}
.pi{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  padding:6px 2px;margin-bottom:4px;width:100%;
}
.pi .icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.pi .lbl{font-size:8px;color:var(--dim);text-align:center;line-height:1.2;font-weight:600}
.pi.armed{border-color:var(--ice);box-shadow:0 0 0 2px rgba(79,209,255,.2)}
.pi:active{transform:scale(.95)}
.pi-add{border-style:dashed;cursor:pointer}

/* ── VIEWPORT ── */
#viewport{flex:1 1 auto;position:relative;overflow:hidden;background:#080f16}
#board{
  position:absolute;inset:0;width:100%;height:100%;
  touch-action:none; /* CRITICAL for iOS */
  user-select:none;-webkit-user-select:none;
  cursor:default;
}
#statusBanner{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--ice2);color:var(--ice);
  padding:7px 12px;border-radius:30px;font-size:12px;font-weight:600;
  display:none;align-items:center;gap:10px;z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:88%;
}
#statusBanner.on{display:flex}
#statusBanner button{background:rgba(255,85,85,.15);color:var(--danger);
  border:none;border-radius:14px;padding:4px 10px;font-size:11px;font-weight:700}
#legendBtn{
  position:absolute;top:10px;right:10px;z-index:21;
  width:32px;height:32px;border-radius:50%;background:var(--panel);
  border:1px solid var(--line);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.4)
}
#legendPanel{
  position:absolute;top:48px;right:10px;z-index:21;
  background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;min-width:170px;max-height:55vh;overflow-y:auto;
  font-size:11px;box-shadow:0 6px 20px rgba(0,0,0,.5);display:none
}
#legendPanel.on{display:block}
.leg-group{margin-bottom:7px}
.leg-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--dim);margin-bottom:3px}
.leg-row{display:flex;align-items:center;gap:6px;padding:2px 0;font-weight:600}
.leg-sw{width:11px;height:11px;border-radius:2px;flex:0 0 auto;border:1px solid rgba(255,255,255,.18)}

/* ── TOOLBAR ── */
#toolbar{
  flex:0 0 auto;display:flex;gap:5px;padding:7px 8px calc(7px + var(--sb));
  background:var(--panel);border-top:1px solid var(--line);overflow-x:auto;z-index:25
}
.tb{
  flex:0 0 auto;min-width:52px;background:var(--panel2);border:1px solid var(--line);
  color:var(--dim);border-radius:8px;padding:7px 5px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:9px;font-weight:700;text-transform:uppercase
}
.tb svg{width:18px;height:18px}
.tb.on{border-color:var(--ice);color:var(--ice);background:rgba(79,209,255,.07)}
.tb.danger{color:var(--danger)}
.tb:disabled{opacity:.35}
#zoomLabel{font-size:9px;color:var(--dim);align-self:center;min-width:32px;text-align:center}

/* ── INSPECTOR ── */
#inspector{
  position:fixed;left:0;right:0;bottom:0;background:var(--panel);
  border-top:1px solid var(--line);border-radius:14px 14px 0 0;
  padding:14px 16px calc(14px + var(--sb));
  transform:translateY(110%);transition:transform .22s ease;
  z-index:50;box-shadow:0 -8px 30px rgba(0,0,0,.6);
  max-height:62vh;overflow-y:auto
}
#inspector.on{transform:translateY(0)}
#insp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#insp-title{font-size:18px;font-family:'Bebas Neue',sans-serif;color:var(--ice)}
.row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.col{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.lbl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.fi{
  width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:9px 10px;font-size:14px
}
.fi:focus{outline:none;border-color:var(--ice2)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:3px}
.btn{
  flex:1 1 auto;background:var(--panel2);border:1px solid var(--line);
  color:var(--text);border-radius:8px;padding:9px 12px;
  font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px
}
.btn:active{opacity:.75}
.btn.primary{background:var(--ice);border-color:var(--ice);color:#04222b}
.btn.danger{background:rgba(255,85,85,.12);border-color:rgba(255,85,85,.35);color:var(--danger)}
.btn.ghost{background:transparent}
.swatch-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.sw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;flex:0 0 auto}
.sw.sel{border-color:var(--ice)}
input[type=color].sw{padding:0;cursor:pointer}

/* ── MODAL ── */
#modal-layer{
  position:fixed;inset:0;background:rgba(4,8,12,.75);
  display:none;align-items:flex-end;justify-content:center;z-index:60;
  backdrop-filter:blur(3px)
}
#modal-layer.on{display:flex}
.modal-card{
  background:var(--panel);border-radius:16px 16px 0 0;width:100%;max-width:480px;
  max-height:88vh;overflow-y:auto;padding:18px 18px calc(18px + var(--sb));
  border-top:1px solid var(--line)
}
@media(min-width:600px){#modal-layer{align-items:center}.modal-card{border-radius:16px}}
.modal-card h2{font-size:22px;margin-bottom:12px;color:var(--ice);font-family:'Bebas Neue',sans-serif;letter-spacing:.04em}
.help-text{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:10px}
.count-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.count-btn{
  background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:5px
}
.count-btn:active{transform:scale(.95)}
.count-btn .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text)}
.dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:50px}
.dots i{width:6px;height:6px;border-radius:50%;display:inline-block}
.proj-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.proj-row{
  display:flex;align-items:center;gap:8px;background:var(--panel2);
  border:1px solid var(--line);border-radius:9px;padding:10px
}
.proj-row .pname{flex:1 1 auto;font-size:14px;font-weight:600}
.proj-row .pdate{font-size:10px;color:var(--dim)}
.proj-row button{background:none;border:none;color:var(--dim);padding:4px 7px}
.proj-row .del-proj{color:var(--danger)}
.shape-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.shape-btn{
  background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:9px;color:var(--dim)
}
.shape-btn.sel{border-color:var(--ice);color:var(--ice)}
.terms-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.term-row{display:flex;gap:6px;align-items:center}
.term-inp{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:7px 9px;font-size:13px}
.term-del{background:none;border:none;color:var(--danger);font-size:16px;padding:4px 7px}

/* ── TOAST ── */
#toast{
  position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(16px);
  background:var(--panel3);border:1px solid var(--line);color:var(--text);
  padding:8px 16px;border-radius:30px;font-size:12px;font-weight:600;z-index:80;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SVG helpers ── */
.node-txt{font-family:'DM Sans',sans-serif;font-weight:700;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
.wire-label-bg{fill:#08111a;opacity:.9}
.wire-label-txt{fill:#c8d8e4;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;text-anchor:middle}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#1e3040;border-radius:6px}
</style>
</head>
<body>
<div id="app">

<div id="topbar">
  <a href="admin.html" class="ib ghost" style="color:var(--dim);font-size:12px">← Admin</a>
  <h1>СХЕМИ</h1>
  <input id="projName" value="Нова схема" maxlength="60">
  <div id="saveDot"></div>
  <div style="display:flex;gap:4px;flex:0 0 auto;margin-left:auto">
    <button class="ib ghost" id="btnProjects">📁</button>
    <button class="ib ghost" id="btnNew">＋</button>
    <button class="ib ghost" id="btnFile">⇅</button>
  </div>
</div>

<div id="workspace">
  <div id="palette"></div>
  <div id="viewport">
    <svg id="board" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="g1" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M40 0H0V40" fill="none" stroke="#0e1a24" stroke-width="1"/>
        </pattern>
        <pattern id="g2" width="200" height="200" patternUnits="userSpaceOnUse">
          <rect width="200" height="200" fill="url(#g1)"/>
          <path d="M200 0H0V200" fill="none" stroke="#132030" stroke-width="1.4"/>
        </pattern>
      </defs>
      <rect id="bg" x="-9999" y="-9999" width="99999" height="99999" fill="url(#g2)"/>
      <text id="emptyHint" x="1200" y="800" text-anchor="middle" fill="#2a4055" font-size="22" font-family="DM Sans">Обери прилад зліва, потім торкнись полотна</text>
      <g id="wiresLayer"></g>
      <g id="nodesLayer"></g>
      <g id="handlesLayer"></g>
    </svg>
    <div id="statusBanner"><span id="statusText"></span><button id="statusCancel">✕</button></div>
    <button id="legendBtn">ℹ️</button>
    <div id="legendPanel"></div>
  </div>
</div>

<div id="toolbar">
  <button class="tb on" id="tSel" title="Вибір">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 3l5.5 16 2-6.5L19 10 5 3z" fill="currentColor"/></svg>
    Вибір
  </button>
  <button class="tb" id="tCable" title="Кабель">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="5" cy="6" r="2.5" stroke="currentColor" stroke-width="1.6"/><circle cx="19" cy="18" r="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M7 7.5l10 10" stroke="currentColor" stroke-width="1.6"/></svg>
    Кабель
  </button>
  <button class="tb danger" id="tDel" disabled title="Видалити">
    <svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.6"/></svg>
    Видал.
  </button>
  <button class="tb" id="tUndo" title="Скасувати">
    <svg viewBox="0 0 24 24" fill="none"><path d="M7 7L3 11l4 4M3 11h11a6 6 0 010 12h-2" stroke="currentColor" stroke-width="1.6"/></svg>
    Назад
  </button>
  <button class="tb" id="tZoomOut">－</button>
  <div id="zoomLabel">100%</div>
  <button class="tb" id="tZoomIn">＋</button>
  <button class="tb" id="tFit">⤢ Вид</button>
  <button class="tb" id="tPdf">
    <svg viewBox="0 0 24 24" fill="none"><path d="M6 2h9l5 5v15H6V2z" stroke="currentColor" stroke-width="1.5"/><path d="M9 12h6M9 15h6M9 9h2" stroke="currentColor" stroke-width="1.5"/></svg>
    PDF
  </button>
  <button class="tb" id="tHelp">？ Допом.</button>
</div>

<div id="inspector">
  <div id="insp-head">
    <div id="insp-title">Прилад</div>
    <button class="ib ghost" id="inspClose">✕</button>
  </div>
  <div id="insp-body"></div>
</div>

</div>
<div id="modal-layer"><div class="modal-card" id="modal-card"></div></div>
<div id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none">

<script>
(function(){'use strict';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const WIRE_COLORS=[
  {hex:'#e03030',label:'R · 24В'},
  {hex:'#f0ede4',label:'W · Нагрів'},
  {hex:'#f4c430',label:'Y · Холод'},
  {hex:'#3a8f3e',label:'G · Вент.'},
  {hex:'#2a65b0',label:'C · Спільн.'},
  {hex:'#7a4a26',label:'Зона / 2-й'},
  {hex:'#e07830',label:'O/B · Реверс'},
  {hex:'#404448',label:'Допом.'},
];
const EQUIP={
  furnace:      {abbr:'ПІЧ', label:'Піч / повітронагрівач',accent:'#ff8a4c',shape:'rect',    bw:90, bh:60},
  ac:           {abbr:'AC',  label:'Кондиціонер (AC)',      accent:'#4fd1ff',shape:'rect',    bw:90, bh:60},
  coil:         {abbr:'КОЙЛ',label:'Койл',                  accent:'#4fd1ff',shape:'rect',    bw:80, bh:54},
  thermostat:   {abbr:'T',   label:'Термостат',             accent:'#e9eef3',shape:'circle',  bw:64, bh:64},
  zoneboard:    {abbr:'ZB',  label:'Зонна коробка',         accent:'#b07bff',shape:'hex',     bw:100,bh:70},
  humidistat:   {abbr:'HSTAT',label:'Гумідистат',           accent:'#ff6f91',shape:'circle',  bw:54, bh:54},
  transformer:  {abbr:'TR',  label:'Трансформатор',         accent:'#ffd24f',shape:'triangle',bw:64, bh:64},
  relay:        {abbr:'REL', label:'Реле',                  accent:'#ffd24f',shape:'rect',    bw:58, bh:58},
  humidifier:   {abbr:'HUM', label:'Зволожувач',            accent:'#4fd1ff',shape:'diamond', bw:64, bh:64},
  damper:       {abbr:'DMP', label:'Демпфер',               accent:'#2bd1a0',shape:'rectRot', bw:70, bh:40},
  sensor:       {abbr:'S',   label:'Сенсор зони',           accent:'#5fd96a',shape:'circle',  bw:40, bh:40},
  outdoorsensor:{abbr:'OAS', label:'Зовн. сенсор',          accent:'#5fe0e0',shape:'circleDash',bw:40,bh:40},
  board:        {abbr:'ПЛАТА',label:'Плата з клемами',      accent:'#9bd17f',shape:'board',   bw:140,bh:70},
  custom:       {abbr:'?',   label:'Свій блок',             accent:'#9aa7b3',shape:'rectDash',bw:88, bh:58},
  note:         {abbr:'',    label:'Нотатка',               accent:'#9aa7b3',shape:'none',    bw:130,bh:28},
};
const PALETTE_GROUPS=[
  {title:'Обладнання',items:['furnace','ac','coil']},
  {title:'Контроль',  items:['thermostat','zoneboard','transformer','relay','humidistat']},
  {title:'Сенсори',   items:['sensor','outdoorsensor']},
  {title:'Плати',     items:['board']},
  {title:'Інше',      items:['humidifier','damper','custom','note']},
];
const CUSTOM_SHAPES=[
  {key:'rect',label:'Прямок.'},
  {key:'circle',label:'Коло'},
  {key:'diamond',label:'Ромб'},
  {key:'triangle',label:'Трикут.'},
  {key:'hex',label:'Шестик.'},
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let proj=null;      // {id,name,nodes[],wires[]}
let hist=[];        // undo snapshots
let customTypes=[]; // [{key,abbr,label,accent,shape,bw,bh}]
let selId=null, selKind=null; // 'node'|'wire'
let toolMode='select'; // 'select'|'place'|'cable-from'|'cable-to'
let armType=null;       // type key being placed
let pendingCable=null;  // {colors:[{hex,label}]}
let cableFromId=null;
let saveTimer=null;

// Viewport — SVG viewBox
// board element fills its container, viewBox controls what's shown
const board=document.getElementById('board');
const viewport=document.getElementById('viewport');
let vb={x:0,y:0,w:1600,h:1000}; // current viewBox
function setVB(){board.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`)}
function toSVG(cx,cy){
  const r=board.getBoundingClientRect();
  return{x:vb.x+(cx-r.left)/r.width*vb.w, y:vb.y+(cy-r.top)/r.height*vb.h};
}
function svgPx(){// how many SVG units = 1 CSS pixel
  return vb.w/board.getBoundingClientRect().width;
}

// ═══════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════
const Store={
  async get(k){
    try{if(window.storage?.get){const r=await window.storage.get(k,false);return r?.value||null}}catch(e){}
    try{return localStorage.getItem(k)}catch(e){return null}
  },
  async set(k,v){
    try{if(window.storage?.set){await window.storage.set(k,v,false);return}}catch(e){}
    try{localStorage.setItem(k,v)}catch(e){}
  },
  async del(k){
    try{if(window.storage?.delete){await window.storage.delete(k,false)}}catch(e){}
    try{localStorage.removeItem(k)}catch(e){}
  },
};
const IDX_KEY='fh-wiring-idx', LAST_KEY='fh-wiring-last', CT_KEY='fh-wiring-ct';
function projKey(id){return'fh-wiring-p-'+id}
function uid(){return'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function blankProj(name){
  return{id:uid(),name:name||'Нова схема',updatedAt:Date.now(),nodes:[],wires:[]};
}
async function loadIdx(){try{const r=await Store.get(IDX_KEY);return r?JSON.parse(r):[]}catch(e){return[]}}
async function saveIdx(list){await Store.set(IDX_KEY,JSON.stringify(list))}
async function loadCustomTypes(){
  try{const r=await Store.get(CT_KEY);customTypes=r?JSON.parse(r):[];}catch(e){customTypes=[];}
  customTypes.forEach(c=>{EQUIP[c.key]={abbr:c.abbr,label:c.label,accent:c.accent,shape:c.shape,bw:c.bw,bh:c.bh};});
}
async function saveCustomTypes(){await Store.set(CT_KEY,JSON.stringify(customTypes))}

function getNode(id){return proj.nodes.find(n=>n.id===id)}
function getWire(id){return proj.wires.find(w=>w.id===id)}

// ═══════════════════════════════════════════════════════════
// GEOMETRY
// ═══════════════════════════════════════════════════════════
function nodeDims(n){
  const e=EQUIP[n.type];
  const w=n.nodeW!=null?n.nodeW:(n.type==='board'?Math.max(120,(n.terminals||[]).length*34+20):e.bw);
  const h=n.nodeH!=null?n.nodeH:e.bh;
  return{w:Math.max(20,w),h:Math.max(14,h)};
}
function rot(lx,ly,rad){return{x:lx*Math.cos(rad)-ly*Math.sin(rad),y:lx*Math.sin(rad)+ly*Math.cos(rad)}}
function nodeTransform(n){return`translate(${n.x},${n.y}) rotate(${n.rotation||0})`}

function pointOnBoundary(n,tx,ty){
  const{w,h}=nodeDims(n);
  const rx=w/2+8, ry=h/2+8;
  const rad=-((n.rotation||0)*Math.PI/180);
  let dx=tx-n.x, dy=ty-n.y;
  // rotate into local frame
  const lx=dx*Math.cos(rad)-dy*Math.sin(rad);
  const ly=dx*Math.sin(rad)+dy*Math.cos(rad);
  let fx=lx,fy=ly;
  if(Math.abs(lx)<.001&&Math.abs(ly)<.001){fx=1;fy=0;}
  const d=Math.sqrt((fx*fx)/(rx*rx)+(fy*fy)/(ry*ry))||1;
  const t=1/d;
  const bxl=fx*t, byl=fy*t;
  // rotate back
  const radfwd=(n.rotation||0)*Math.PI/180;
  const br=rot(bxl,byl,radfwd);
  return{x:n.x+br.x,y:n.y+br.y};
}
function terminalPoint(n,idx){
  const{w,h}=nodeDims(n);
  const terms=(n.terminals||[]);
  const cnt=terms.length||1;
  const lx=-w/2+(w/(cnt+1))*(idx+1);
  const ly=h/2;
  const rad=(n.rotation||0)*Math.PI/180;
  const r=rot(lx,ly,rad);
  return{x:n.x+r.x,y:n.y+r.y};
}
function wireEndPoint(w,end){
  const id=w[end+'Id'];
  if(id){
    const n=getNode(id); if(!n)return null;
    const term=w[end+'Term'];
    if(n.type==='board'&&term!=null&&n.terminals?.[term]!=null){
      const tp=terminalPoint(n,term);
      return{x:tp.x,y:tp.y,node:n,isTerminal:true};
    }
    return{x:n.x,y:n.y,node:n,isTerminal:false};
  }
  const p=w[end+'Point'];
  return p?{x:p.x,y:p.y,node:null}:null;
}
function computeWireGeom(w){
  const A=wireEndPoint(w,'from'), B=wireEndPoint(w,'to');
  if(!A||!B)return null;
  const dir=w.bend||B;
  const dirA=w.bend||A;
  let p1=A.isTerminal?{x:A.x,y:A.y}:pointOnBoundary(A.node,dir.x,dir.y);
  let p2=B.isTerminal?{x:B.x,y:B.y}:pointOnBoundary(B.node,dirA.x,dirA.y);
  // parallel offset for bundle
  if(!w.bend&&w.fromId&&w.toId&&!A.isTerminal&&!B.isTerminal){
    const sibs=proj.wires.filter(s=>s.fromId===w.fromId&&s.toId===w.toId&&!s.bend&&s.fromTerm==null&&s.toTerm==null);
    const idx=sibs.findIndex(s=>s.id===w.id);
    const off=(idx-(sibs.length-1)/2)*6;
    if(off){
      const dx=p2.x-p1.x,dy=p2.y-p1.y,len=Math.hypot(dx,dy)||1;
      const nx=-dy/len,ny=dx/len;
      p1={x:p1.x+nx*off,y:p1.y+ny*off};
      p2={x:p2.x+nx*off,y:p2.y+ny*off};
    }
  }
  return{p1,p2,mid:w.bend||{x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2}};
}
function ptSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(!l2)return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

// ═══════════════════════════════════════════════════════════
// HIT TESTING  (all in SVG coordinates)
// ═══════════════════════════════════════════════════════════
function hitNode(sx,sy){
  const margin=svgPx()*14;
  for(let i=proj.nodes.length-1;i>=0;i--){
    const n=proj.nodes[i];
    if(n.type==='note'){
      const{w}=nodeDims(n);
      if(Math.abs(sx-n.x)<=w/2+margin&&Math.abs(sy-n.y)<=16+margin)return n;
      continue;
    }
    const{w,h}=nodeDims(n);
    const rad=-((n.rotation||0)*Math.PI/180);
    const dx=sx-n.x,dy=sy-n.y;
    const lx=dx*Math.cos(rad)-dy*Math.sin(rad);
    const ly=dx*Math.sin(rad)+dy*Math.cos(rad);
    if(Math.abs(lx)<=w/2+margin&&Math.abs(ly)<=h/2+margin)return n;
  }
  return null;
}
function hitWire(sx,sy){
  const thr=svgPx()*16;
  for(const w of proj.wires){
    const g=computeWireGeom(w); if(!g)continue;
    const d=w.bend
      ?Math.min(ptSegDist(sx,sy,g.p1.x,g.p1.y,w.bend.x,w.bend.y),
                ptSegDist(sx,sy,w.bend.x,w.bend.y,g.p2.x,g.p2.y))
      :ptSegDist(sx,sy,g.p1.x,g.p1.y,g.p2.x,g.p2.y);
    if(d<thr)return w;
  }
  return null;
}
// Returns {type,data} or null
// types: 'resize-right','resize-left','resize-top','resize-bottom','rotate','wire-from','wire-to','wire-bend'
function hitHandle(sx,sy){
  const thr=svgPx()*24; // generous hit area for fingers
  if(selKind==='node'){
    const n=getNode(selId); if(!n)return null;
    const{w,h}=nodeDims(n);
    const rad=(n.rotation||0)*Math.PI/180;
    // edge handles
    const edges=[
      {type:'resize-right', lx:w/2, ly:0},
      {type:'resize-left',  lx:-w/2,ly:0},
      {type:'resize-bottom',lx:0,   ly:h/2},
      {type:'resize-top',   lx:0,   ly:-h/2},
    ];
    for(const e of edges){
      const r=rot(e.lx,e.ly,rad);
      if(Math.hypot(sx-n.x-r.x,sy-n.y-r.y)<thr)return{type:e.type,node:n};
    }
    // rotate handle: above the node
    const{h:nh}=nodeDims(n);
    const arm=nh/2+40;
    const rr=rot(0,-arm,rad);
    if(Math.hypot(sx-n.x-rr.x,sy-n.y-rr.y)<thr)return{type:'rotate',node:n};
  }
  if(selKind==='wire'){
    const w=getWire(selId); if(!w)return null;
    const g=computeWireGeom(w); if(!g)return null;
    if(Math.hypot(sx-g.p1.x,sy-g.p1.y)<thr)return{type:'wire-from',wire:w,geom:g};
    if(Math.hypot(sx-g.p2.x,sy-g.p2.y)<thr)return{type:'wire-to',  wire:w,geom:g};
    if(Math.hypot(sx-g.mid.x,sy-g.mid.y)<thr)return{type:'wire-bend',wire:w,geom:g};
  }
  return null;
}
function findNodeNear(sx,sy,exceptId){
  const thr=svgPx()*32;
  let best=null,bestD=Infinity;
  proj.nodes.forEach(n=>{
    if(n.id===exceptId||n.type==='note')return;
    const d=Math.hypot(sx-n.x,sy-n.y);
    if(d<thr&&d<bestD){bestD=d;best=n;}
  });
  if(!best)return null;
  let term=null;
  if(best.type==='board'&&best.terminals?.length){
    let td=Infinity;
    best.terminals.forEach((_,i)=>{
      const tp=terminalPoint(best,i);
      const dd=Math.hypot(sx-tp.x,sy-tp.y);
      if(dd<td&&dd<thr){td=dd;term=i;}
    });
  }
  return{node:best,term};
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
const nodesLayer=document.getElementById('nodesLayer');
const wiresLayer=document.getElementById('wiresLayer');
const handlesLayer=document.getElementById('handlesLayer');
const emptyHint=document.getElementById('emptyHint');
const SVG='http://www.w3.org/2000/svg';
function el(tag,attrs={}){
  const e=document.createElementNS(SVG,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  return e;
}
function txt(s){return document.createTextNode(s)}

function hexPts(rx,ry){
  const pts=[];
  for(let i=0;i<6;i++){const a=Math.PI/180*(60*i-30);pts.push(`${(rx*Math.cos(a)).toFixed(1)},${(ry*Math.sin(a)).toFixed(1)}`);}
  return pts.join(' ');
}

function nodeShape(n){
  const e=EQUIP[n.type],{w,h}=nodeDims(n),c=e.accent;
  switch(e.shape){
    case'circle':   return[el('circle',{r:w/2,fill:c,stroke:'#05101a','stroke-width':2})];
    case'circleDash':return[el('circle',{r:w/2,fill:'none',stroke:c,'stroke-width':2.2,'stroke-dasharray':'4,3'})];
    case'hex':      return[el('polygon',{points:hexPts(w/2,h/2),fill:c,stroke:'#05101a','stroke-width':2})];
    case'diamond':  return[el('polygon',{points:`0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0`,fill:c,stroke:'#05101a','stroke-width':2})];
    case'triangle': return[el('polygon',{points:`0,${-h/2} ${w/2},${h/2} ${-w/2},${h/2}`,fill:c,stroke:'#05101a','stroke-width':2})];
    case'rectRot':  {const r=el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:4,fill:c,stroke:'#05101a','stroke-width':2,transform:'rotate(18)'});return[r];}
    case'rectDash': return[el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:7,fill:'none',stroke:c,'stroke-width':2.2,'stroke-dasharray':'5,4'})];
    case'board':    return buildBoardShape(n);
    case'none':     return[];
    default:        return[el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:8,fill:c,stroke:'#05101a','stroke-width':2})];
  }
}
function buildBoardShape(n){
  const e=EQUIP[n.type]||EQUIP.board,{w,h}=nodeDims(n),c=e.accent;
  const parts=[
    el('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:6,fill:'#141e2a',stroke:c,'stroke-width':2}),
    el('rect',{x:-w/2+5,y:-h/2+5,width:w-10,height:14,rx:3,fill:c,opacity:.2}),
  ];
  (n.terminals||[]).forEach((lbl,i)=>{
    const{w:tw}=nodeDims(n);
    const cnt=(n.terminals||[]).length||1;
    const lx=-tw/2+(tw/(cnt+1))*(i+1);
    const by=h/2;
    const bg=el('rect',{x:lx-9,y:by-7,width:18,height:14,rx:2,fill:'#0e1a24',stroke:c,'stroke-width':1.4});
    const t=el('text',{x:lx,y:by+1,'text-anchor':'middle','dominant-baseline':'middle','font-size':8.5,'font-family':'DM Sans','font-weight':700,fill:'#cce0ea','pointer-events':'none'});
    t.textContent=lbl||'·';
    parts.push(bg,t);
  });
  return parts;
}

function buildNodeEl(n){
  const g=el('g',{transform:nodeTransform(n),'data-id':n.id,class:'nd'+(selId===n.id&&selKind==='node'?' sel':'')});
  const e=EQUIP[n.type],{w,h}=nodeDims(n);
  if(n.type==='note'){
    g.appendChild(el('rect',{x:-w/2,y:-14,width:w,height:28,rx:6,fill:'#09111a',stroke:'#2a3f50','stroke-dasharray':'3,3',opacity:.9}));
    const t=el('text',{x:0,y:4,'text-anchor':'middle','dominant-baseline':'middle','font-size':12.5,'font-family':'DM Sans',fill:'#c0d4e0','pointer-events':'none'});
    t.textContent=n.label||'Текст…';
    g.appendChild(t);
  } else {
    nodeShape(n).forEach(s=>g.appendChild(s));
    // abbreviation text
    const t=el('text',{x:0,y:n.type==='board'?-h/2+21:0,'text-anchor':'middle','dominant-baseline':'middle',fill:n.type==='board'?'#dde8f0':'#04222b','font-size':13,'font-family':'DM Sans','font-weight':700,'pointer-events':'none'});
    t.textContent=trunc(n.label||e.abbr,16);
    g.appendChild(t);
  }
  return g;
}

function buildWireEl(w){
  const g=el('g',{'data-id':w.id,class:'wr'+(selId===w.id&&selKind==='wire'?' sel':'')});
  const geo=computeWireGeom(w); if(!geo)return g;
  const{p1,p2,mid}=geo;
  const isSel=selId===w.id&&selKind==='wire';
  const d=w.bend?`M${p1.x},${p1.y}L${w.bend.x},${w.bend.y}L${p2.x},${p2.y}`:`M${p1.x},${p1.y}L${p2.x},${p2.y}`;
  const attrs={'fill':'none','stroke-linecap':'round','stroke-linejoin':'round'};
  if(isSel){g.appendChild(el('path',{...attrs,d,stroke:'var(--ice)','stroke-width':10,opacity:.25}));}
  g.appendChild(el('path',{...attrs,d,stroke:'#000','stroke-width':5.5,opacity:.4}));
  g.appendChild(el('path',{...attrs,d,stroke:w.color,'stroke-width':3.2}));
  // wide invisible hit area
  g.appendChild(el('path',{...attrs,d,stroke:'transparent','stroke-width':24,class:'whit'}));
  // label only when selected
  if(isSel&&w.label){
    const lw=Math.max(18,w.label.length*6.3+10);
    g.appendChild(el('rect',{class:'wire-label-bg',x:mid.x-lw/2,y:mid.y-9,width:lw,height:16,rx:4}));
    const lt=el('text',{class:'wire-label-txt',x:mid.x,y:mid.y+3});
    lt.textContent=w.label;
    g.appendChild(lt);
  }
  return g;
}

function buildHandles(){
  handlesLayer.innerHTML='';
  if(selKind==='node'){
    const n=getNode(selId); if(!n)return;
    buildNodeHandles(n);
  } else if(selKind==='wire'){
    const w=getWire(selId); if(!w)return;
    buildWireHandles(w);
  }
}
function makeHandleCircle(x,y,r,fill,cls=''){
  const c=el('circle',{cx:x,cy:y,r,fill,stroke:'#04222b','stroke-width':2,class:'handle'+' '+cls});
  handlesLayer.appendChild(c);
  return c;
}
function makeHandleRect(x,y,w,h,fill){
  const r=el('rect',{x:x-w/2,y:y-h/2,width:w,height:h,rx:4,fill,stroke:'#04222b','stroke-width':2,class:'handle'});
  handlesLayer.appendChild(r);
  return r;
}
function buildNodeHandles(n){
  const{w,h}=nodeDims(n);
  const rad=(n.rotation||0)*Math.PI/180;
  const R=14;
  // 4 edge handles
  [{lx:w/2,ly:0},{lx:-w/2,ly:0},{lx:0,ly:h/2},{lx:0,ly:-h/2}].forEach(({lx,ly})=>{
    const r=rot(lx,ly,rad);
    makeHandleCircle(n.x+r.x,n.y+r.y,R,'#1c2d3a');
    // icon
    const t=el('text',{x:n.x+r.x,y:n.y+r.y,'text-anchor':'middle','dominant-baseline':'middle',
      'font-size':13,fill:'#4fd1ff','pointer-events':'none'});
    t.textContent=Math.abs(lx)>Math.abs(ly)?'⇔':'⇕';
    handlesLayer.appendChild(t);
  });
  // rotate handle (arm + circle)
  const arm=h/2+38;
  const rr=rot(0,-arm,rad);
  const hx=n.x+rr.x, hy=n.y+rr.y;
  const edge=rot(0,-h/2,rad);
  const ln=el('line',{x1:n.x+edge.x,y1:n.y+edge.y,x2:hx,y2:hy,stroke:'#ffd24f','stroke-width':2,'stroke-dasharray':'4,3','pointer-events':'none'});
  handlesLayer.appendChild(ln);
  makeHandleCircle(hx,hy,R,'#ffd24f');
  const t=el('text',{x:hx,y:hy,'text-anchor':'middle','dominant-baseline':'middle',
    'font-size':16,fill:'#05101a','pointer-events':'none','font-weight':'bold'});
  t.textContent='↻';
  handlesLayer.appendChild(t);
}
function buildWireHandles(w){
  const g=computeWireGeom(w); if(!g)return;
  const R=13;
  makeHandleCircle(g.p1.x,g.p1.y,R,'#4fd1ff');
  makeHandleCircle(g.p2.x,g.p2.y,R,'#ff8a4c');
  makeHandleCircle(g.mid.x,g.mid.y,10,'#ffd24f');
}

function renderAll(){
  nodesLayer.innerHTML='';
  wiresLayer.innerHTML='';
  handlesLayer.innerHTML='';
  proj.wires.forEach(w=>wiresLayer.appendChild(buildWireEl(w)));
  proj.nodes.forEach(n=>nodesLayer.appendChild(buildNodeEl(n)));
  buildHandles();
  emptyHint.style.display=proj.nodes.length?'none':'block';
  buildLegend();
}
// Fast update of a single node's SVG element (used during drag/resize)
function updateNodeInPlace(n){
  const old=nodesLayer.querySelector(`[data-id="${n.id}"]`);
  if(!old)return;
  const neo=buildNodeEl(n);
  nodesLayer.replaceChild(neo,old);
}
// Fast update of wires connected to a node (used during drag)
function updateWiresFor(nodeId){
  proj.wires.forEach(w=>{
    if(w.fromId!==nodeId&&w.toId!==nodeId)return;
    const old=wiresLayer.querySelector(`[data-id="${w.id}"]`);
    if(!old)return;
    wiresLayer.replaceChild(buildWireEl(w),old);
  });
}

// ═══════════════════════════════════════════════════════════
// POINTER EVENT HANDLING (THE KEY PART)
// All touch/mouse events go to the board SVG, no child listeners.
// This is the only reliable way on iOS Safari.
// ═══════════════════════════════════════════════════════════
let drag=null;
let ptrMap=new Map(); // pointerId → {x,y}

board.addEventListener('pointerdown',onDown,{passive:false});
board.addEventListener('pointermove',onMove,{passive:false});
board.addEventListener('pointerup',  onUp);
board.addEventListener('pointercancel',onUp);

function onDown(e){
  e.preventDefault();
  board.setPointerCapture(e.pointerId);
  ptrMap.set(e.pointerId,{x:e.clientX,y:e.clientY});
  
  if(ptrMap.size===2){
    // Switch to pan/pinch mode
    const pts=[...ptrMap.values()];
    drag={type:'pinch',
      startDist:Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y),
      startMidC:{x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2},
      startVB:{...vb}};
    return;
  }

  const s=toSVG(e.clientX,e.clientY);

  // 1. Place mode
  if(toolMode==='place'&&armType){
    pushHist();
    const n={id:uid(),type:armType,x:Math.round(s.x),y:Math.round(s.y),
      label:'', rotation:0};
    if(armType==='board')n.terminals=['R','C','G','Y','W','O/B'];
    proj.nodes.push(n);
    disarm();
    selId=n.id; selKind='node';
    renderAll(); saveDeferred();
    openInspNode(n);
    return;
  }

  // 2. Cable-from mode: tap a node
  if(toolMode==='cable-from'){
    const n=hitNode(s.x,s.y);
    if(n){cableFromId=n.id; toolMode='cable-to'; setStatus('Тепер торкнись приладу-призначення (2/2)');}
    return;
  }
  // 3. Cable-to mode: tap destination
  if(toolMode==='cable-to'){
    const n=hitNode(s.x,s.y);
    if(n&&n.id!==cableFromId){
      createCable(cableFromId,n.id);
      cancelMode();
    }
    return;
  }

  // 4. Select mode: hit test handles → nodes → wires → pan
  const h=hitHandle(s.x,s.y);
  if(h){
    drag={type:h.type,s0:s,...h,vb0:{...vb}};
    if(h.type==='wire-from'||h.type==='wire-to'||h.type==='wire-bend'){
      const orig={fromId:h.wire.fromId,fromPoint:h.wire.fromPoint,fromTerm:h.wire.fromTerm,
        toId:h.wire.toId,toPoint:h.wire.toPoint,toTerm:h.wire.toTerm,bend:h.wire.bend};
      drag.orig=orig;
    }
    pushHist();
    return;
  }

  const n=hitNode(s.x,s.y);
  if(n){
    if(selId!==n.id||selKind!=='node'){selId=n.id;selKind='node';renderAll();openInspNode(n);}
    drag={type:'node',node:n,s0:s,ox:n.x,oy:n.y,moved:false};
    return;
  }

  const w=hitWire(s.x,s.y);
  if(w){
    if(selId!==w.id||selKind!=='wire'){selId=w.id;selKind='wire';renderAll();openInspWire(w);}
    drag={type:'wire-sel'};
    return;
  }

  // Empty space → deselect + start pan
  clearSel();
  drag={type:'pan',s0:s,vb0:{...vb}};
}

function onMove(e){
  e.preventDefault();
  const prev=ptrMap.get(e.pointerId)||{x:e.clientX,y:e.clientY};
  ptrMap.set(e.pointerId,{x:e.clientX,y:e.clientY});

  if(ptrMap.size===2&&drag?.type==='pinch'){
    const pts=[...ptrMap.values()];
    const dist=Math.hypot(pts[1].x-pts[0].x,pts[1].y-pts[0].y);
    const midC={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
    const vb0=drag.startVB;
    const scale=drag.startDist/dist;
    const newW=Math.max(400,Math.min(4000,vb0.w*scale));
    const newH=newW*(vb0.h/vb0.w);
    // keep the pinch midpoint stationary in SVG space
    const midSVG={x:vb0.x+(drag.startMidC.x-board.getBoundingClientRect().left)/board.getBoundingClientRect().width*vb0.w,
                  y:vb0.y+(drag.startMidC.y-board.getBoundingClientRect().top)/board.getBoundingClientRect().height*vb0.h};
    const r=board.getBoundingClientRect();
    const fx=(midC.x-r.left)/r.width;
    const fy=(midC.y-r.top)/r.height;
    vb={x:midSVG.x-fx*newW,y:midSVG.y-fy*newH,w:newW,h:newH};
    setVB(); updateZoomLabel();
    return;
  }

  if(!drag)return;
  const s=toSVG(e.clientX,e.clientY);

  if(drag.type==='pan'){
    const ds=drag.s0, vb0=drag.vb0;
    vb.x=vb0.x-(s.x-ds.x);
    vb.y=vb0.y-(s.y-ds.y);
    // recalculate s because vb just changed - use client delta instead
    const r=board.getBoundingClientRect();
    const dCx=e.clientX-prev.x, dCy=e.clientY-prev.y;
    const svgPerPxX=vb.w/r.width, svgPerPxY=vb.h/r.height;
    vb.x-=dCx*svgPerPxX; vb.y-=dCy*svgPerPxY;
    setVB(); return;
  }

  if(drag.type==='node'){
    const{node:n,s0,ox,oy}=drag;
    const dx=s.x-s0.x,dy=s.y-s0.y;
    if(!drag.moved&&Math.hypot(dx,dy)>svgPx()*5)drag.moved=true;
    if(drag.moved){
      n.x=ox+dx; n.y=oy+dy;
      const g=nodesLayer.querySelector(`[data-id="${n.id}"]`);
      if(g)g.setAttribute('transform',nodeTransform(n));
      updateWiresFor(n.id);
      buildHandles();
    }
    return;
  }

  // Resize handles
  if(drag.type.startsWith('resize-')){
    const n=drag.node;
    if(n.nodeW==null){const d=nodeDims(n);n.nodeW=d.w;n.nodeH=d.h;}
    const rad=(n.rotation||0)*Math.PI/180;
    const r=board.getBoundingClientRect();
    const dCx=e.clientX-prev.x,dCy=e.clientY-prev.y;
    const spx=vb.w/r.width, spy=vb.h/r.height;
    const dlx=dCx*spx, dly=dCy*spy;
    // project delta onto handle axis in local frame
    const axis=drag.type==='resize-right'?{lx:1,ly:0}
              :drag.type==='resize-left'? {lx:-1,ly:0}
              :drag.type==='resize-bottom'?{lx:0,ly:1}:{lx:0,ly:-1};
    const axS=rot(axis.lx,axis.ly,rad);
    const delta=(dlx*axS.x+dly*axS.y)*2;
    if(drag.type.includes('right')||drag.type.includes('left'))
      n.nodeW=Math.max(24,n.nodeW+delta);
    else
      n.nodeH=Math.max(16,n.nodeH+delta);
    updateNodeInPlace(n);
    updateWiresFor(n.id);
    buildHandles();
    return;
  }

  // Rotate handle
  if(drag.type==='rotate'){
    const n=drag.node;
    const ang=Math.atan2(s.y-n.y,s.x-n.x)*180/Math.PI+90;
    n.rotation=((Math.round(ang/15)*15)%360+360)%360;
    const g=nodesLayer.querySelector(`[data-id="${n.id}"]`);
    if(g)g.setAttribute('transform',nodeTransform(n));
    updateWiresFor(n.id);
    buildHandles();
    return;
  }

  // Wire endpoint drag
  if(drag.type==='wire-from'||drag.type==='wire-to'){
    const w=drag.wire;
    const end=drag.type==='wire-from'?'from':'to';
    w[end+'Id']=null; w[end+'Point']={x:s.x,y:s.y}; w[end+'Term']=null;
    w.bend=null;
    const old=wiresLayer.querySelector(`[data-id="${w.id}"]`);
    if(old)wiresLayer.replaceChild(buildWireEl(w),old);
    buildHandles();
    return;
  }

  // Wire bend drag
  if(drag.type==='wire-bend'){
    drag.wire.bend={x:s.x,y:s.y};
    const old=wiresLayer.querySelector(`[data-id="${drag.wire.id}"]`);
    if(old)wiresLayer.replaceChild(buildWireEl(drag.wire),old);
    buildHandles();
    return;
  }
}

function onUp(e){
  ptrMap.delete(e.pointerId);

  if(ptrMap.size<2&&drag?.type==='pinch'){
    drag=null; return;
  }

  if(!drag){return;}
  const dt=drag;
  drag=null;

  if(dt.type==='node'&&dt.moved){saveDeferred();}

  if(dt.type==='wire-from'||dt.type==='wire-to'){
    const w=dt.wire, end=dt.type==='wire-from'?'from':'to';
    const s=toSVG(e.clientX,e.clientY);
    const hit=findNodeNear(s.x,s.y,null);
    if(hit){
      w[end+'Id']=hit.node.id; delete w[end+'Point'];
      w[end+'Term']=hit.term!=null?hit.term:null;
    }
    w.bend=null;
    renderAll(); saveDeferred();
  }

  if(dt.type==='wire-bend'){renderAll(); saveDeferred();}
  if(dt.type.startsWith('resize-')||dt.type==='rotate'){renderAll(); saveDeferred();}
}

  const fType=document.getElementById('fType');

      updateNodeInPlace(n);saveDeferred();

      pushHist();n.terminals?.splice(i,1);
      renderAll();openInspNode(n);saveDeferred();

    if(ev.target.classList.contains('t-add')){
      pushHist();(n.terminals=n.terminals||[]).push('');
      renderAll();openInspNode(n);saveDeferred();

      pushHist();proj.nodes=proj.nodes.filter(x=>x.id!==n.id);
      proj.nodes.push(n);renderAll();saveDeferred();

    if(ev.target.id==='fBack'){
      pushHist();proj.nodes=proj.nodes.filter(x=>x.id!==n.id);
      proj.nodes.unshift(n);renderAll();saveDeferred();

  updateDeleteBtn();
}

function zoom(factor){
  const cx=vb.x+vb.w/2, cy=vb.y+vb.h/2;
  const nw=Math.max(400,Math.min(4200,vb.w*factor));
  const nh=Math.max(250,Math.min(3000,vb.h*factor));
  vb={x:cx-nw/2,y:cy-nh/2,w:nw,h:nh};
  setVB();updateZoomLabel();
}
function updateZoomLabel(){
  // "zoom" is how much bigger than default (1600 wide = 100%)
  const pct=Math.round(1600/vb.w*100);
  document.getElementById('zoomLabel').textContent=pct+'%';
}
function fitView(){
  const r=board.getBoundingClientRect();
  const aspect=r.height/r.width;
  vb={x:0,y:0,w:1600,h:1600*aspect};
  setVB();updateZoomLabel();
}

}

  item.addEventListener('click',()=>armPlace(type,item));
  return item;

function miniSVG(shape,c){
  switch(shape){
    case'circle':    return`<svg viewBox="-17 -17 34 34" width="34" height="34"><circle cx="0" cy="0" r="13" fill="${c}"/></svg>`;
    case'circleDash':return`<svg viewBox="-17 -17 34 34" width="34" height="34"><circle cx="0" cy="0" r="13" fill="none" stroke="${c}" stroke-width="2.2" stroke-dasharray="3,3"/></svg>`;
    case'hex':       return`<svg viewBox="-17 -17 34 34" width="34" height="34"><polygon points="${hexPts(14,10)}" fill="${c}"/></svg>`;
    case'diamond':   return`<svg viewBox="-17 -17 34 34" width="34" height="34"><polygon points="0,-14 14,0 0,14 -14,0" fill="${c}"/></svg>`;
    case'triangle':  return`<svg viewBox="-17 -17 34 34" width="34" height="34"><polygon points="0,-14 13,12 -13,12" fill="${c}"/></svg>`;
    case'rectRot':   return`<svg viewBox="-17 -17 34 34" width="34" height="34"><rect x="-14" y="-7" width="28" height="14" rx="2" fill="${c}" transform="rotate(20)"/></svg>`;
    case'rectDash':  return`<svg viewBox="-17 -17 34 34" width="34" height="34"><rect x="-13" y="-9" width="26" height="18" rx="3" fill="none" stroke="${c}" stroke-width="2.2" stroke-dasharray="4,3"/></svg>`;
    case'board':     return`<svg viewBox="-17 -17 34 34" width="34" height="34"><rect x="-14" y="-9" width="28" height="18" rx="2" fill="${c}"/><circle cx="-7" cy="9" r="2.5" fill="${c}"/><circle cx="0" cy="9" r="2.5" fill="${c}"/><circle cx="7" cy="9" r="2.5" fill="${c}"/></svg>`;
    case'none':      return`<svg viewBox="-17 -17 34 34" width="34" height="34"><text x="0" y="6" text-anchor="middle" font-size="20" fill="${c}" font-family="DM Sans">Aa</text></svg>`;
    case'add':       return`<svg viewBox="-17 -17 34 34" width="34" height="34"><circle cx="0" cy="0" r="13" fill="none" stroke="${c}" stroke-width="2" stroke-dasharray="3,3"/><path d="M0 -6V6M-6 0H6" stroke="${c}" stroke-width="2"/></svg>`;
    default:         return`<svg viewBox="-17 -17 34 34" width="34" height="34"><rect x="-14" y="-10" width="28" height="20" rx="3" fill="${c}"/></svg>`;
  }
}

// CUSTOM TYPE CREATOR
// ═══════════════════════════════════════════════════════════
function hue2hex(h){
  const s=65,l=55;
  const f=n=>{const k=(n+h/30)%12;const a=s/100*Math.min(l/100,1-l/100);return Math.round(255*(l/100-a*Math.max(-1,Math.min(k-3,9-k,1))));}
  return '#'+[f(0),f(8),f(4)].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function nextAccent(){
  const used=Object.values(EQUIP).map(e=>e.accent).concat(customTypes.map(c=>c.accent));
  const hueOf=h=>{let r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let hv=0;if(max!==min){const d=max-min;if(max===r)hv=((g-b)/d)%6;else if(max===g)hv=(b-r)/d+2;else hv=(r-g)/d+4;hv*=60;if(hv<0)hv+=360;}return hv;};
  const usedH=used.map(hueOf);
  let best=0,bestScore=-1;
  for(let i=0;i<36;i++){
    const h=(i*137.508+17)%360;
    const score=usedH.length?Math.min(...usedH.map(u=>{const d=Math.abs(h-u)%360;return d>180?360-d:d;})):999;
    if(score>bestScore){bestScore=score;best=h;}
  }
  return hue2hex(best);
}
function openCustomTypeModal(){
  const shapeGrid=CUSTOM_SHAPES.map(s=>`<button class="shape-btn" data-s="${s.key}">${miniSVG(s.shape,'#4fd1ff')}<span>${s.label}</span></button>`).join('');
  openModal(`<h2>Новий елемент</h2>
    <p class="help-text">Введи назву — колір підбереться автоматично, щоб не збігатися з рештою.</p>
    <div class="col"><div class="lbl">Назва</div><input class="fi" id="ctName" placeholder="напр. Насос конденсату"></div>
    <div class="lbl" style="margin-bottom:6px">Форма</div>
    <div class="shape-grid">${shapeGrid}</div>

function buildLegend(){
  const panel=document.getElementById('legendPanel');
  const types=new Map(),colors=new Map();
  proj.nodes.forEach(n=>{if(n.type!=='note')types.set(n.type,EQUIP[n.type]);});
  proj.wires.forEach(w=>{if(w.label)colors.set(w.color,w.label);});
  let h='';
  if(types.size){
    h+=`<div class="leg-group"><div class="leg-t">Обладнання</div>`;
    types.forEach((e,k)=>h+=`<div class="leg-row"><span class="leg-sw" style="background:${e.accent}"></span>${escX(e.label)}</div>`);
    h+=`</div>`;
  }
  if(colors.size){
    h+=`<div class="leg-group"><div class="leg-t">Проводи</div>`;
    colors.forEach((lbl,hex)=>h+=`<div class="leg-row"><span class="leg-sw" style="background:${hex}"></span>${escX(lbl)}</div>`);
    h+=`</div>`;
  }
  panel.innerHTML=h||`<div style="color:var(--dim);font-size:11px">Тут з'явиться легенда</div>`;
}

async function saveNow(){
  proj.name=document.getElementById('projName').value||'Без назви';
  proj.updatedAt=Date.now();
  await Store.set(projKey(proj.id),JSON.stringify(proj));
  let idx=await loadIdx();

  idx.unshift({id:proj.id,name:proj.name,updatedAt:proj.updatedAt});
  await saveIdx(idx);
  await Store.set(LAST_KEY,proj.id);
  setSaveDot('ok');
}

    document.getElementById('projName').value=proj.name||'Без назви';
    hist=[];selId=null;selKind=null;inspector.classList.remove('on');

async function loadGhCfg(){try{const r=await Store.get(GHCFG_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function slug(s){return(s||'shema').toLowerCase().replace(/[^a-z0-9а-яіїє\-]/gi,'-').replace(/^-+|-+$/g,'')||'shema';}
function downloadJson(){

async function pushToGithub(cfg){
  toast('Зберігаю на GitHub…');
  try{
    const path=(cfg.folder?cfg.folder.replace(/^\/+|\/+$/g,'')+'/'+'':'')+slug(proj.name)+'.json';
    const apiUrl=`https://api.github.com/repos/${cfg.repo}/contents/${path}`;
    const headers={'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json'};
    let sha;
    const g=await fetch(apiUrl+`?ref=${encodeURIComponent(cfg.branch||'main')}`,{headers});
    if(g.ok)sha=(await g.json()).sha;
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(proj,null,2))));
    const p=await fetch(apiUrl,{method:'PUT',headers:{...headers,'Content-Type':'application/json'},
      body:JSON.stringify({message:'Схема: '+proj.name,content,sha,branch:cfg.branch||'main'})});
    if(!p.ok){const t=await p.text();throw new Error(p.status+': '+t);}
    toast('Збережено на GitHub ✓');
  }catch(err){toast('GitHub помилка: '+(err.message||'спробуй знову'));}
}

async function exportPdf(){
  if(!proj.nodes.length){toast('Спочатку додай прилади');return;}
  toast('Готую PDF…');
  // Compute bounding box
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  proj.nodes.forEach(n=>{
    const{w,h}=nodeDims(n);
    const pad=h/2+50;
    minX=Math.min(minX,n.x-w/2-pad);minY=Math.min(minY,n.y-h/2-pad);
    maxX=Math.max(maxX,n.x+w/2+pad);maxY=Math.max(maxY,n.y+h/2+pad);
  });
  const bw=maxX-minX, bh=maxY-minY+60;
  // Render to offscreen SVG
  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox',`${minX} ${minY} ${bw} ${bh}`);
  svg.setAttribute('width',bw); svg.setAttribute('height',bh);
  svg.setAttribute('xmlns',svgNS);
  // White bg
  const bgr=document.createElementNS(svgNS,'rect');
  bgr.setAttribute('x',minX-999);bgr.setAttribute('y',minY-999);
  bgr.setAttribute('width',99999);bgr.setAttribute('height',99999);bgr.setAttribute('fill','#fff');
  svg.appendChild(bgr);
  // Wires
  const wg=document.createElementNS(svgNS,'g');
  proj.wires.forEach(w=>{
    const geo=computeWireGeom(w);if(!geo)return;
    const{p1,p2}=geo;
    const d=w.bend?`M${p1.x},${p1.y}L${w.bend.x},${w.bend.y}L${p2.x},${p2.y}`:`M${p1.x},${p1.y}L${p2.x},${p2.y}`;
    const mk=(stroke,sw,op)=>{const e=document.createElementNS(svgNS,'path');e.setAttribute('d',d);e.setAttribute('fill','none');e.setAttribute('stroke',stroke);e.setAttribute('stroke-width',sw);e.setAttribute('stroke-linecap','round');if(op)e.setAttribute('opacity',op);return e;};
    wg.appendChild(mk('#ccc',5.5,.3));
    wg.appendChild(mk(w.color,3.2));
    if(w.label){
      const mid=w.bend||{x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
      const lw=Math.max(18,w.label.length*6+10);
      const rb=document.createElementNS(svgNS,'rect');
      rb.setAttribute('x',mid.x-lw/2);rb.setAttribute('y',mid.y-9);
      rb.setAttribute('width',lw);rb.setAttribute('height',16);rb.setAttribute('rx',4);
      rb.setAttribute('fill','#fff');rb.setAttribute('stroke','#ddd');rb.setAttribute('stroke-width',1);
      wg.appendChild(rb);
      const lt=document.createElementNS(svgNS,'text');
      lt.setAttribute('x',mid.x);lt.setAttribute('y',mid.y+3);
      lt.setAttribute('text-anchor','middle');lt.setAttribute('font-size',10.5);
      lt.setAttribute('font-family','DM Sans,sans-serif');lt.setAttribute('font-weight',700);
      lt.setAttribute('fill','#222');lt.textContent=w.label;
      wg.appendChild(lt);
    }
  });
  svg.appendChild(wg);
  // Nodes
  const ng=document.createElementNS(svgNS,'g');
  proj.nodes.forEach(n=>{
    const e=EQUIP[n.type];const{w,h}=nodeDims(n);
    const g=document.createElementNS(svgNS,'g');
    g.setAttribute('transform',`translate(${n.x},${n.y}) rotate(${n.rotation||0})`);
    if(n.type==='note'){
      const r=document.createElementNS(svgNS,'rect');
      r.setAttribute('x',-w/2);r.setAttribute('y',-14);r.setAttribute('width',w);r.setAttribute('height',28);r.setAttribute('rx',5);r.setAttribute('fill','#f5f5f5');r.setAttribute('stroke','#ccc');
      g.appendChild(r);
      const t=document.createElementNS(svgNS,'text');
      t.setAttribute('x',0);t.setAttribute('y',4);t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size',12);t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('fill','#333');
      t.textContent=n.label||'Текст';g.appendChild(t);
    } else {
      // Shape
      const fill=e.accent,stroke='#555';
      let shapeEl;
      switch(e.shape){
        case'circle':shapeEl=document.createElementNS(svgNS,'circle');shapeEl.setAttribute('r',w/2);break;
        case'hex':shapeEl=document.createElementNS(svgNS,'polygon');shapeEl.setAttribute('points',hexPts(w/2,h/2));break;
        case'diamond':shapeEl=document.createElementNS(svgNS,'polygon');shapeEl.setAttribute('points',`0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0`);break;
        case'triangle':shapeEl=document.createElementNS(svgNS,'polygon');shapeEl.setAttribute('points',`0,${-h/2} ${w/2},${h/2} ${-w/2},${h/2}`);break;
        default:shapeEl=document.createElementNS(svgNS,'rect');shapeEl.setAttribute('x',-w/2);shapeEl.setAttribute('y',-h/2);shapeEl.setAttribute('width',w);shapeEl.setAttribute('height',h);shapeEl.setAttribute('rx',6);
      }
      shapeEl.setAttribute('fill',fill);shapeEl.setAttribute('stroke',stroke);shapeEl.setAttribute('stroke-width',1.5);
      g.appendChild(shapeEl);
      const t=document.createElementNS(svgNS,'text');
      t.setAttribute('x',0);t.setAttribute('y',n.type==='board'?-h/2+17:0);
      t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size',Math.min(13,w/3.5));t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('font-weight',700);
      t.setAttribute('fill',n.type==='board'?'#eee':'#111');
      t.textContent=trunc(n.label||e.abbr,14);g.appendChild(t);
      // board terminals
      if(n.type==='board'&&n.terminals){
        n.terminals.forEach((lbl,i)=>{
          const cnt=n.terminals.length||1;
          const lx=-w/2+(w/(cnt+1))*(i+1);
          const by=h/2;
          const rb=document.createElementNS(svgNS,'rect');
          rb.setAttribute('x',lx-9);rb.setAttribute('y',by-7);rb.setAttribute('width',18);rb.setAttribute('height',14);rb.setAttribute('rx',2);rb.setAttribute('fill','#fff');rb.setAttribute('stroke',fill);rb.setAttribute('stroke-width',1.2);
          g.appendChild(rb);
          const tb=document.createElementNS(svgNS,'text');
          tb.setAttribute('x',lx);tb.setAttribute('y',by+1);tb.setAttribute('text-anchor','middle');tb.setAttribute('dominant-baseline','middle');tb.setAttribute('font-size',8);tb.setAttribute('font-family','DM Sans,sans-serif');tb.setAttribute('font-weight',700);tb.setAttribute('fill','#222');tb.textContent=lbl||'·';
          g.appendChild(tb);
        });
      }
    }
    ng.appendChild(g);
  });
  svg.appendChild(ng);
  // Title
  const titleG=document.createElementNS(svgNS,'g');
  const t1=document.createElementNS(svgNS,'text');
  t1.setAttribute('x',minX+10);t1.setAttribute('y',maxY+28);
  t1.setAttribute('font-size',18);t1.setAttribute('font-family','DM Sans,sans-serif');t1.setAttribute('font-weight',700);t1.setAttribute('fill','#111');
  t1.textContent=proj.name||'Схема';
  const t2=document.createElementNS(svgNS,'text');
  t2.setAttribute('x',minX+10);t2.setAttribute('y',maxY+46);
  t2.setAttribute('font-size',11);t2.setAttribute('font-family','DM Sans,sans-serif');t2.setAttribute('fill','#666');
  t2.textContent='Frost Hawk HVAC · '+new Date().toLocaleDateString('uk-UA');
  titleG.appendChild(t1);titleG.appendChild(t2);svg.appendChild(titleG);
  // Rasterize
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));});
  const scale=2;
  const cv=document.createElement('canvas');
  cv.width=bw*scale;cv.height=bh*scale;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.drawImage(img,0,0,cv.width,cv.height);
  const dataUrl=cv.toDataURL('image/png',1);
  const{jsPDF}=window.jspdf;
  const orientation=bw>bh?'landscape':'portrait';
  const doc=new jsPDF({orientation,unit:'pt',format:'a4'});
  const pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight();
  const m=28,aw=pw-m*2,ah=ph-m*2;
  const r=Math.min(aw/bw,ah/bh);
  const iw=bw*r,ih=bh*r;
  doc.addImage(dataUrl,'PNG',(pw-iw)/2,m,iw,ih);
  // Wire legend
  const seen=new Map();
  proj.wires.forEach(w=>{if(w.label)seen.set(w.color+'|'+w.label,w);});
  if(seen.size){
    let ly=m+ih+18;
    if(ly>ph-30){doc.addPage();ly=m;}
    doc.setFontSize(9);doc.setTextColor(80,90,100);
    doc.text('Легенда:',m,ly);ly+=14;
    [...seen.values()].forEach((w,i)=>{
      const x=m+(i%3)*180;const y=ly+Math.floor(i/3)*14;
      doc.setFillColor(w.color);doc.circle(x+4,y-3,4,'F');
      doc.setTextColor(40,50,60);doc.text(w.label,x+14,y);
    });
  }
  doc.save(slug(proj.name)+'.pdf');
  toast('PDF готовий ✓');
}

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2000);
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD (desktop)
// ═══════════════════════════════════════════════════════════
window.addEventListener('keydown',e=>{
  if(e.key==='Escape')cancelMode();
  if((e.key==='Delete'||e.key==='Backspace')&&selId&&document.activeElement.tagName!=='INPUT'){
    e.preventDefault();
    pushHist();
    if(selKind==='node')deleteNode(selId);
    else{proj.wires=proj.wires.filter(w=>w.id!==selId);clearSel();renderAll();saveDeferred();}
  }
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undo();}
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
async function init(){
  await loadCustomTypes();
  buildPalette();
  fitView();
  const lastId=await Store.get(LAST_KEY);
  if(lastId){
    const raw=await Store.get(projKey(lastId));
    if(raw){try{proj=JSON.parse(raw);proj.nodes=proj.nodes||[];proj.wires=proj.wires||[];}catch(e){proj=blankProj();}}
    else proj=blankProj();
  } else proj=blankProj();
  document.getElementById('projName').value=proj.name;
  renderAll();
  setVB();updateZoomLabel();
}
init();
})();
</script>
