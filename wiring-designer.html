<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Схеми — Frost Hawk HVAC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#08111a;--p:#0f1b26;--p2:#162230;--p3:#1d2e3e;--ln:#1d2e3e;--ice:#4fd1ff;--emb:#ff8a4c;--tx:#dde8f0;--dim:#5e7d95;--ok:#4fdc8f;--err:#ff5555;--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif}
button,input,select{font-family:inherit}
/* APP */
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
/* TOPBAR */
#top{flex:0 0 auto;display:flex;align-items:center;gap:5px;padding:6px 8px;background:var(--p);border-bottom:1px solid var(--ln);z-index:20;min-height:50px}
#top h1{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ice);letter-spacing:.05em;flex:0 0 auto}
#pname{background:transparent;border:1px solid transparent;color:var(--tx);font-size:13px;font-weight:600;padding:5px 6px;border-radius:7px;flex:1 1 auto;min-width:0;max-width:120px}
#pname:focus{border-color:var(--ice);outline:none;background:var(--p2)}
#sdot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:0 0 auto;transition:background .2s}
#sdot.busy{background:var(--emb)}
.ib{flex:0 0 auto;background:var(--p2);border:1px solid var(--ln);color:var(--tx);border-radius:7px;padding:6px 9px;font-size:11px;font-weight:600;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;cursor:pointer}
.ib:active{opacity:.7}
.ib.g{background:transparent;border-color:transparent}
/* WORKSPACE */
#ws{flex:1 1 auto;display:flex;min-height:0}
/* PALETTE */
#pal{flex:0 0 76px;background:var(--p);border-right:1px solid var(--ln);overflow-y:auto;padding:6px 4px}
.pg{margin-bottom:10px}
.pg-h{font-size:8.5px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.07em;text-align:center;margin-bottom:4px}
.pi{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--p2);border:1px solid var(--ln);border-radius:8px;padding:6px 2px;margin-bottom:4px;width:100%;cursor:pointer}
.pi:active{transform:scale(.94)}
.pi.arm{border-color:var(--ice);box-shadow:0 0 0 2px rgba(79,209,255,.18)}
.pi svg,.pi .ico{width:36px;height:36px;flex:0 0 auto}
.pi .lbl{font-size:7.5px;color:var(--dim);text-align:center;line-height:1.2;font-weight:600}
/* STAGE */
#stage{flex:1 1 auto;position:relative;overflow:hidden;background:#07101a}
#cvs{position:absolute;inset:0;width:100%;height:100%;touch-action:none;user-select:none;-webkit-user-select:none;display:block;cursor:crosshair}
/* STATUS */
#sb{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--p);border:1px solid var(--ice);color:var(--ice);padding:7px 14px;border-radius:30px;font-size:12px;font-weight:600;display:none;align-items:center;gap:10px;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.5);max-width:86%;pointer-events:auto}
#sb.on{display:flex}
#sb button{background:rgba(255,85,85,.15);color:var(--err);border:none;border-radius:14px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
/* LEGEND */
#lgbtn{position:absolute;top:10px;right:10px;z-index:10;width:32px;height:32px;border-radius:50%;background:var(--p);border:1px solid var(--ln);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#lg{position:absolute;top:48px;right:10px;z-index:10;background:var(--p);border:1px solid var(--ln);border-radius:10px;padding:10px 12px;min-width:165px;max-height:54vh;overflow-y:auto;font-size:11px;box-shadow:0 6px 20px rgba(0,0,0,.5);display:none}
#lg.on{display:block}
.lg-g{margin-bottom:7px}.lg-t{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin-bottom:3px}
.lg-r{display:flex;align-items:center;gap:6px;padding:2px 0;font-weight:600}
.lg-s{width:11px;height:11px;border-radius:2px;flex:0 0 auto;border:1px solid rgba(255,255,255,.15)}
/* TOOLBAR */
#tb{flex:0 0 auto;display:flex;gap:5px;padding:7px 8px calc(7px + var(--sb));background:var(--p);border-top:1px solid var(--ln);overflow-x:auto;z-index:20}
.tbtn{flex:0 0 auto;min-width:50px;background:var(--p2);border:1px solid var(--ln);color:var(--dim);border-radius:8px;padding:7px 4px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8.5px;font-weight:700;text-transform:uppercase;cursor:pointer}
.tbtn svg{width:18px;height:18px;flex:0 0 auto}
.tbtn.on{border-color:var(--ice);color:var(--ice);background:rgba(79,209,255,.07)}
.tbtn.d{color:var(--err)}
.tbtn:disabled{opacity:.3;cursor:default}
#zlbl{font-size:9px;color:var(--dim);align-self:center;min-width:30px;text-align:center}
/* INSPECTOR */
#ins{position:fixed;left:0;right:0;bottom:0;background:var(--p);border-top:1px solid var(--ln);border-radius:14px 14px 0 0;padding:14px 16px calc(14px + var(--sb));transform:translateY(110%);transition:transform .2s ease;z-index:40;box-shadow:0 -8px 30px rgba(0,0,0,.6);max-height:60vh;overflow-y:auto}
#ins.on{transform:translateY(0)}
#ins-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#ins-ti{font-family:'Bebas Neue',sans-serif;font-size:19px;color:var(--ice);letter-spacing:.04em}
.fc{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.fl{font-size:9.5px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;background:var(--p2);border:1px solid var(--ln);color:var(--tx);border-radius:8px;padding:9px 10px;font-size:14px}
.fi:focus{outline:none;border-color:var(--ice)}
.brow{display:flex;gap:7px;flex-wrap:wrap;margin-top:3px}
.btn{flex:1 1 auto;background:var(--p2);border:1px solid var(--ln);color:var(--tx);border-radius:8px;padding:9px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.btn:active{opacity:.7}
.btn.pr{background:var(--ice);border-color:var(--ice);color:#03202c}
.btn.dr{background:rgba(255,85,85,.1);border-color:rgba(255,85,85,.3);color:var(--err)}
.btn.gh{background:transparent}
.sw-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.sw{width:28px;height:28px;border-radius:50%;border:2px solid transparent;flex:0 0 auto;cursor:pointer}
.sw.on{border-color:var(--ice)}
/* MODAL */
#ml{position:fixed;inset:0;background:rgba(4,8,14,.75);display:none;align-items:flex-end;justify-content:center;z-index:60;backdrop-filter:blur(3px)}
#ml.on{display:flex}
.mc{background:var(--p);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:18px 18px calc(18px + var(--sb));border-top:1px solid var(--ln)}
@media(min-width:600px){#ml{align-items:center}.mc{border-radius:16px}}
.mc h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;color:var(--ice);margin-bottom:12px}
.ht{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:10px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.cbtn{background:var(--p2);border:1px solid var(--ln);border-radius:9px;padding:9px 4px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.cbtn:active{transform:scale(.94)}
.cbtn .n{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--tx)}
.dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:48px}
.dots i{width:6px;height:6px;border-radius:50%;display:inline-block}
.pl{display:flex;flex-direction:column;gap:6px}
.pr-row{display:flex;align-items:center;gap:8px;background:var(--p2);border:1px solid var(--ln);border-radius:9px;padding:10px}
.pr-row .nm{flex:1;font-size:14px;font-weight:600}
.pr-row .dt{font-size:10px;color:var(--dim)}
.pr-row button{background:none;border:none;cursor:pointer;padding:4px 7px}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.sb2{background:var(--p2);border:1px solid var(--ln);border-radius:8px;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:8px;color:var(--dim);cursor:pointer}
.sb2.on{border-color:var(--ice);color:var(--ice)}
.tl{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.tr{display:flex;gap:6px;align-items:center}
.ti{flex:1;background:var(--p2);border:1px solid var(--ln);color:var(--tx);border-radius:7px;padding:7px 9px;font-size:13px}
/* TOAST */
#toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(14px);background:var(--p3);border:1px solid var(--ln);color:var(--tx);padding:8px 16px;border-radius:30px;font-size:12px;font-weight:600;z-index:80;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#1d3040;border-radius:5px}
</style>
</head>
<body>
<div id="app">
<div id="top">
  <a href="admin.html" class="ib g" style="color:var(--dim);font-size:11px">← Admin</a>
  <h1>СХЕМИ</h1>
  <input id="pname" value="Нова схема" maxlength="60">
  <div id="sdot"></div>
  <div style="display:flex;gap:4px;margin-left:auto;flex:0 0 auto">
    <button class="ib g" id="bPrj">📁</button>
    <button class="ib g" id="bNew">＋</button>
    <button class="ib g" id="bFile">⇅</button>
  </div>
</div>
<div id="ws">
  <div id="pal"></div>
  <div id="stage">
    <svg id="cvs" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="g1" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#0d1920" stroke-width="1"/></pattern>
        <pattern id="g2" width="200" height="200" patternUnits="userSpaceOnUse"><rect width="200" height="200" fill="url(#g1)"/><path d="M200 0H0V200" fill="none" stroke="#12222e" stroke-width="1.4"/></pattern>
      </defs>
      <rect id="gbg" x="-99999" y="-99999" width="199999" height="199999" fill="url(#g2)"/>
      <text id="hint" x="800" y="500" text-anchor="middle" fill="#1a3045" font-size="20" font-family="DM Sans">Оберіть прилад зліва → торкніться полотна</text>
      <g id="wL"></g>
      <g id="nL"></g>
      <g id="hL"></g>
    </svg>
    <div id="sb"><span id="sbt"></span><button id="sbx">✕</button></div>
    <button id="lgbtn">ℹ️</button>
    <div id="lg"></div>
  </div>
</div>
<div id="tb">
  <button class="tbtn on" id="tSel"><svg viewBox="0 0 24 24" fill="none"><path d="M5 3l5.5 16 2-6.5L19 10 5 3z" fill="currentColor"/></svg>Вибір</button>
  <button class="tbtn" id="tCab"><svg viewBox="0 0 24 24" fill="none"><circle cx="5" cy="6" r="2.5" stroke="currentColor" stroke-width="1.6"/><circle cx="19" cy="18" r="2.5" stroke="currentColor" stroke-width="1.6"/><path d="M7 7.5l10 10" stroke="currentColor" stroke-width="1.6"/></svg>Кабель</button>
  <button class="tbtn d" id="tDel" disabled><svg viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5h6v2M7 7l1 13h8l1-13" stroke="currentColor" stroke-width="1.6"/></svg>Видал.</button>
  <button class="tbtn" id="tUndo"><svg viewBox="0 0 24 24" fill="none"><path d="M7 7L3 11l4 4M3 11h11a6 6 0 010 12h-2" stroke="currentColor" stroke-width="1.6"/></svg>Назад</button>
  <button class="tbtn" id="tZm">－</button>
  <div id="zlbl">100%</div>
  <button class="tbtn" id="tZp">＋</button>
  <button class="tbtn" id="tFit">⤢ Вид</button>
  <button class="tbtn" id="tPdf"><svg viewBox="0 0 24 24" fill="none"><path d="M6 2h9l5 5v15H6V2z" stroke="currentColor" stroke-width="1.5"/><path d="M9 12h6M9 15h6M9 9h2" stroke="currentColor" stroke-width="1.5"/></svg>PDF</button>
  <button class="tbtn" id="tHelp">？ Допом.</button>
</div>
<div id="ins">
  <div id="ins-hd"><div id="ins-ti">Прилад</div><button class="ib g" id="insCl">✕</button></div>
  <div id="ins-bd"></div>
</div>
</div>
<div id="ml"><div class="mc" id="mc"></div></div>
<div id="toast"></div>
<input type="file" id="fi" accept=".json" style="display:none">
<script>
(function(){'use strict';
// ─────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────
const WC=[
  {hex:'#e03030',lbl:'R · 24В'},
  {hex:'#f0ede4',lbl:'W · Нагрів'},
  {hex:'#f4c430',lbl:'Y · Холод'},
  {hex:'#3a8f3e',lbl:'G · Вент.'},
  {hex:'#2a65b0',lbl:'C · Спільн.'},
  {hex:'#7a4a26',lbl:'Зона/2-й'},
  {hex:'#e07830',lbl:'O/B · Реверс'},
  {hex:'#404448',lbl:'Допом.'},
];
const EQ={
  furnace:      {ab:'ПІЧ', lb:'Піч / повітронагрівач',ac:'#ff8a4c',sh:'rect',    bw:90,bh:60},
  ac:           {ab:'AC',  lb:'Кондиціонер (AC)',      ac:'#4fd1ff',sh:'rect',    bw:90,bh:60},
  coil:         {ab:'КОЙЛ',lb:'Койл',                  ac:'#4fd1ff',sh:'rect',    bw:80,bh:54},
  thermostat:   {ab:'T',   lb:'Термостат',             ac:'#e9eef3',sh:'circle',  bw:64,bh:64},
  zoneboard:    {ab:'ZB',  lb:'Зонна коробка',         ac:'#b07bff',sh:'hex',     bw:100,bh:70},
  humidistat:   {ab:'HSTAT',lb:'Гумідистат',           ac:'#ff6f91',sh:'circle',  bw:54,bh:54},
  transformer:  {ab:'TR',  lb:'Трансформатор',         ac:'#ffd24f',sh:'tri',     bw:64,bh:64},
  relay:        {ab:'REL', lb:'Реле',                  ac:'#ffd24f',sh:'rect',    bw:58,bh:58},
  humidifier:   {ab:'HUM', lb:'Зволожувач',            ac:'#4fd1ff',sh:'diamond', bw:64,bh:64},
  damper:       {ab:'DMP', lb:'Демпфер',               ac:'#2bd1a0',sh:'rectR',   bw:70,bh:40},
  sensor:       {ab:'S',   lb:'Сенсор зони',           ac:'#5fd96a',sh:'circle',  bw:40,bh:40},
  outsensor:    {ab:'OAS', lb:'Зовн. сенсор',          ac:'#5fe0e0',sh:'circleD', bw:40,bh:40},
  board:        {ab:'ПЛАТА',lb:'Плата з клемами',      ac:'#9bd17f',sh:'board',   bw:140,bh:70},
  custom:       {ab:'?',   lb:'Свій блок',             ac:'#9aa7b3',sh:'rectD',   bw:88,bh:58},
  note:         {ab:'',    lb:'Нотатка',               ac:'#9aa7b3',sh:'none',    bw:130,bh:28},
};
const PG=[
  {t:'Обладнання',k:['furnace','ac','coil']},
  {t:'Контроль',  k:['thermostat','zoneboard','transformer','relay','humidistat']},
  {t:'Сенсори',   k:['sensor','outsensor']},
  {t:'Плати',     k:['board']},
  {t:'Інше',      k:['humidifier','damper','custom','note']},
];
const SH_NAMES=[
  {k:'rect',l:'Прямок.'},
  {k:'circle',l:'Коло'},
  {k:'diamond',l:'Ромб'},
  {k:'tri',l:'Трикут.'},
  {k:'hex',l:'Шестик.'},
];
const NS='http://www.w3.org/2000/svg';

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let P=null;         // project {id,name,nodes[],wires[]}
let H=[];           // undo history
let CT=[];          // custom types
let sel=null;       // {kind:'node'|'wire', id}
let mode='sel';     // 'sel'|'place'|'cfrom'|'cto'
let armT=null;      // type being placed
let pCable=null;    // {colors:[]} pending cable
let cfromId=null;   // cable from node id
let saveT=null;

// ─────────────────────────────────────────────────────────────
// VIEWPORT (SVG viewBox)
// vb = {x,y,w,h} — the SVG coordinate area shown on screen
// ─────────────────────────────────────────────────────────────
const cvs=document.getElementById('cvs');
const stg=document.getElementById('stage');
let vb={x:0,y:0,w:1600,h:900};

function applyVB(){cvs.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);}
function vbR(){return cvs.getBoundingClientRect();}

// Convert client pixels → SVG coordinates
function c2s(cx,cy){const r=vbR();return{x:vb.x+(cx-r.left)/r.width*vb.w,y:vb.y+(cy-r.top)/r.height*vb.h};}
// Convert client-pixel delta → SVG-unit delta (using CURRENT vb — correct for incremental moves)
function d2s(dcx,dcy){const r=vbR();return{dx:dcx/r.width*vb.w,dy:dcy/r.height*vb.h};}
// SVG units per CSS pixel
function spx(){return vb.w/vbR().width;}

function fitView(){
  const r=vbR();
  const asp=r.height/r.width||0.5625;
  vb={x:0,y:0,w:1600,h:1600*asp};
  applyVB();updateZlbl();
}
function updateZlbl(){document.getElementById('zlbl').textContent=Math.round(1600/vb.w*100)+'%';}
function doZoom(factor){
  const cx=vb.x+vb.w/2,cy=vb.y+vb.h/2;
  const nw=Math.max(350,Math.min(5000,vb.w*factor));
  const nh=Math.max(200,Math.min(4000,vb.h*factor));
  vb={x:cx-nw/2,y:cy-nh/2,w:nw,h:nh};
  applyVB();updateZlbl();
}

// ─────────────────────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────────────────────
const K={idx:'fh-wi',last:'fh-wl',ct:'fh-wct'};
function pk(id){return'fh-w-'+id;}
async function sg(k){try{if(window.storage?.get){const r=await window.storage.get(k,false);return r?.value||null;}}catch(e){}try{return localStorage.getItem(k);}catch(e){return null;}}
async function ss(k,v){try{if(window.storage?.set){await window.storage.set(k,v,false);return;}}catch(e){}try{localStorage.setItem(k,v);}catch(e){}}
async function sd(k){try{if(window.storage?.delete)await window.storage.delete(k,false);}catch(e){}try{localStorage.removeItem(k);}catch(e){}}
async function ldIdx(){try{const r=await sg(K.idx);return r?JSON.parse(r):[];}catch(e){return[];}}
async function svIdx(l){await ss(K.idx,JSON.stringify(l));}
function uid(){return'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function blank(nm){return{id:uid(),name:nm||'Нова схема',updatedAt:Date.now(),nodes:[],wires:[]};}
function gn(id){return P.nodes.find(n=>n.id===id);}
function gw(id){return P.wires.find(w=>w.id===id);}

// ─────────────────────────────────────────────────────────────
// GEOMETRY
// ─────────────────────────────────────────────────────────────
function ndim(n){
  const e=EQ[n.type];
  const w=n.nodeW!=null?n.nodeW:(n.type==='board'?Math.max(120,(n.terminals||[]).length*34+20):e.bw);
  const h=n.nodeH!=null?n.nodeH:e.bh;
  return{w:Math.max(20,w),h:Math.max(14,h)};
}
function rot(lx,ly,rad){return{x:lx*Math.cos(rad)-ly*Math.sin(rad),y:lx*Math.sin(rad)+ly*Math.cos(rad)};}
function ntx(n){return`translate(${n.x},${n.y}) rotate(${n.rotation||0})`;}

function bndry(n,tx,ty){
  const{w,h}=ndim(n),rx=w/2+9,ry=h/2+9;
  const rad=-((n.rotation||0)*Math.PI/180);
  let dx=tx-n.x,dy=ty-n.y;
  const lx=dx*Math.cos(rad)-dy*Math.sin(rad);
  const ly=dx*Math.sin(rad)+dy*Math.cos(rad);
  let fx=lx||1,fy=ly;
  const d=Math.sqrt((fx*fx)/(rx*rx)+(fy*fy)/(ry*ry))||1;
  const r=rot(fx/d,fy/d,(n.rotation||0)*Math.PI/180);
  return{x:n.x+r.x,y:n.y+r.y};
}
function termPt(n,i){
  const{w,h}=ndim(n),c=(n.terminals||[]).length||1;
  const lx=-w/2+(w/(c+1))*(i+1),ly=h/2;
  const r=rot(lx,ly,(n.rotation||0)*Math.PI/180);
  return{x:n.x+r.x,y:n.y+r.y};
}
function wep(w,end){
  const id=w[end+'Id'];
  if(id){const n=gn(id);if(!n)return null;const t=w[end+'Term'];if(n.type==='board'&&t!=null&&n.terminals?.[t]!=null){const p=termPt(n,t);return{x:p.x,y:p.y,n,isTerm:true};}return{x:n.x,y:n.y,n,isTerm:false};}
  const p=w[end+'Point'];return p?{x:p.x,y:p.y,n:null}:null;
}
function wgeom(w){
  const A=wep(w,'from'),B=wep(w,'to');if(!A||!B)return null;
  const dir=w.bend||B,dirA=w.bend||A;
  let p1=A.isTerm?{x:A.x,y:A.y}:bndry(A.n,dir.x,dir.y);
  let p2=B.isTerm?{x:B.x,y:B.y}:bndry(B.n,dirA.x,dirA.y);
  if(!w.bend&&w.fromId&&w.toId&&!A.isTerm&&!B.isTerm){
    const sb=P.wires.filter(s=>s.fromId===w.fromId&&s.toId===w.toId&&!s.bend&&s.fromTerm==null&&s.toTerm==null);
    const idx=sb.findIndex(s=>s.id===w.id),n=sb.length,off=(idx-(n-1)/2)*6;
    if(off){const dx=p2.x-p1.x,dy=p2.y-p1.y,l=Math.hypot(dx,dy)||1;p1={x:p1.x-dy/l*off,y:p1.y+dx/l*off};p2={x:p2.x-dy/l*off,y:p2.y+dx/l*off};}
  }
  return{p1,p2,mid:w.bend||{x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2}};
}
function psd(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;if(!l)return Math.hypot(px-ax,py-ay);const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}

// ─────────────────────────────────────────────────────────────
// HIT TESTING
// ─────────────────────────────────────────────────────────────
function hitN(sx,sy){
  const m=spx()*14;
  for(let i=P.nodes.length-1;i>=0;i--){
    const n=P.nodes[i];
    if(n.type==='note'){const{w}=ndim(n);if(Math.abs(sx-n.x)<=w/2+m&&Math.abs(sy-n.y)<=16+m)return n;continue;}
    const{w,h}=ndim(n),rad=-((n.rotation||0)*Math.PI/180);
    const dx=sx-n.x,dy=sy-n.y;
    const lx=dx*Math.cos(rad)-dy*Math.sin(rad),ly=dx*Math.sin(rad)+dy*Math.cos(rad);
    if(Math.abs(lx)<=w/2+m&&Math.abs(ly)<=h/2+m)return n;
  }
  return null;
}
function hitW(sx,sy){
  const thr=spx()*16;
  for(const w of P.wires){const g=wgeom(w);if(!g)continue;const d=w.bend?Math.min(psd(sx,sy,g.p1.x,g.p1.y,w.bend.x,w.bend.y),psd(sx,sy,w.bend.x,w.bend.y,g.p2.x,g.p2.y)):psd(sx,sy,g.p1.x,g.p1.y,g.p2.x,g.p2.y);if(d<thr)return w;}
  return null;
}
// Returns handle info or null
function hitH(sx,sy){
  const thr=spx()*26;
  if(sel?.kind==='node'){
    const n=gn(sel.id);if(!n)return null;
    const{w,h}=ndim(n),rad=(n.rotation||0)*Math.PI/180;
    // resize edges
    const edges=[{t:'rr',lx:w/2,ly:0},{t:'rl',lx:-w/2,ly:0},{t:'rb',lx:0,ly:h/2},{t:'rt',lx:0,ly:-h/2}];
    for(const e of edges){const r=rot(e.lx,e.ly,rad);if(Math.hypot(sx-n.x-r.x,sy-n.y-r.y)<thr)return{t:e.t,n};}
    // rotate
    const rh=rot(0,-(h/2+42),rad);if(Math.hypot(sx-n.x-rh.x,sy-n.y-rh.y)<thr)return{t:'ro',n};
  }
  if(sel?.kind==='wire'){
    const w=gw(sel.id);if(!w)return null;
    const g=wgeom(w);if(!g)return null;
    if(Math.hypot(sx-g.p1.x,sy-g.p1.y)<thr)return{t:'wf',w,g};
    if(Math.hypot(sx-g.p2.x,sy-g.p2.y)<thr)return{t:'wt',w,g};
    if(Math.hypot(sx-g.mid.x,sy-g.mid.y)<thr)return{t:'wb',w,g};
  }
  return null;
}
function nearN(sx,sy,excl){
  const thr=spx()*36;let best=null,bd=Infinity;
  P.nodes.forEach(n=>{if(n.id===excl||n.type==='note')return;const d=Math.hypot(sx-n.x,sy-n.y);if(d<thr&&d<bd){bd=d;best=n;}});
  if(!best)return null;
  let term=null;
  if(best.type==='board'&&best.terminals?.length){let td=Infinity;best.terminals.forEach((_,i)=>{const tp=termPt(best,i);const dd=Math.hypot(sx-tp.x,sy-tp.y);if(dd<td&&dd<thr){td=dd;term=i;}});}
  return{n:best,term};
}

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
const wL=document.getElementById('wL');
const nL=document.getElementById('nL');
const hL=document.getElementById('hL');

function mke(tag,a={}){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}
function hxPts(rx,ry){return Array.from({length:6},(_,i)=>{const a=Math.PI/180*(60*i-30);return`${(rx*Math.cos(a)).toFixed(1)},${(ry*Math.sin(a)).toFixed(1)}`;}).join(' ');}

function drawShape(n){
  const e=EQ[n.type],{w,h}=ndim(n),c=e.ac;
  switch(e.sh){
    case'circle': return[mke('circle',{r:w/2,fill:c,stroke:'#050e18','stroke-width':2})];
    case'circleD':return[mke('circle',{r:w/2,fill:'none',stroke:c,'stroke-width':2.2,'stroke-dasharray':'4,3'})];
    case'hex':    return[mke('polygon',{points:hxPts(w/2,h/2),fill:c,stroke:'#050e18','stroke-width':2})];
    case'diamond':return[mke('polygon',{points:`0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0`,fill:c,stroke:'#050e18','stroke-width':2})];
    case'tri':    return[mke('polygon',{points:`0,${-h/2} ${w/2},${h/2} ${-w/2},${h/2}`,fill:c,stroke:'#050e18','stroke-width':2})];
    case'rectR':  return[mke('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:4,fill:c,stroke:'#050e18','stroke-width':2,transform:'rotate(18)'})];
    case'rectD':  return[mke('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:7,fill:'none',stroke:c,'stroke-width':2.2,'stroke-dasharray':'5,4'})];
    case'board':  return drawBoard(n);
    case'none':   return[];
    default:      return[mke('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:8,fill:c,stroke:'#050e18','stroke-width':2})];
  }
}
function drawBoard(n){
  const e=EQ[n.type],{w,h}=ndim(n),c=e.ac;
  const parts=[
    mke('rect',{x:-w/2,y:-h/2,width:w,height:h,rx:6,fill:'#131f2c',stroke:c,'stroke-width':2}),
    mke('rect',{x:-w/2+5,y:-h/2+5,width:w-10,height:14,rx:3,fill:c,opacity:.18}),
  ];
  (n.terminals||[]).forEach((lb,i)=>{
    const c2=(n.terminals||[]).length||1,lx=-w/2+(w/(c2+1))*(i+1),by=h/2;
    const bg=mke('rect',{x:lx-9,y:by-7,width:18,height:14,rx:2,fill:'#0c1820',stroke:c,'stroke-width':1.4});
    const t=mke('text',{x:lx,y:by+1,'text-anchor':'middle','dominant-baseline':'middle','font-size':8.5,'font-family':'DM Sans','font-weight':700,fill:'#cce0ea','pointer-events':'none'});
    t.textContent=lb||'·';parts.push(bg,t);
  });
  return parts;
}
function mkNodeEl(n){
  const e=EQ[n.type],{w,h}=ndim(n);
  const g=mke('g',{transform:ntx(n),'data-id':n.id});
  if(n.type==='note'){
    g.appendChild(mke('rect',{x:-w/2,y:-14,width:w,height:28,rx:6,fill:'#08111a',stroke:'#253a4d','stroke-dasharray':'3,3',opacity:.9}));
    const t=mke('text',{x:0,y:4,'text-anchor':'middle','dominant-baseline':'middle','font-size':12.5,'font-family':'DM Sans',fill:'#bed4e0','pointer-events':'none'});
    t.textContent=n.label||'Текст…';g.appendChild(t);
  }else{
    drawShape(n).forEach(s=>g.appendChild(s));
    const t=mke('text',{x:0,y:n.type==='board'?-h/2+20:0,'text-anchor':'middle','dominant-baseline':'middle','font-size':Math.min(13,w/4),'font-family':'DM Sans','font-weight':700,fill:n.type==='board'?'#dde8f0':'#04202c','pointer-events':'none'});
    t.textContent=trunc(n.label||e.ab,16);g.appendChild(t);
  }
  if(sel?.kind==='node'&&sel.id===n.id){
    const hl=mke('rect',{x:-w/2-6,y:n.type==='note'?-20:-h/2-6,width:w+12,height:n.type==='note'?40:h+12,rx:10,fill:'none',stroke:'var(--ice)','stroke-width':2,opacity:.7,'stroke-dasharray':'5,3'});
    g.appendChild(hl);
  }
  return g;
}
function mkWireEl(w){
  const g=mke('g',{'data-wid':w.id});
  const geo=wgeom(w);if(!geo)return g;
  const{p1,p2,mid}=geo,isSel=sel?.kind==='wire'&&sel.id===w.id;
  const d=w.bend?`M${p1.x},${p1.y}L${w.bend.x},${w.bend.y}L${p2.x},${p2.y}`:`M${p1.x},${p1.y}L${p2.x},${p2.y}`;
  const a={'fill':'none','stroke-linecap':'round','stroke-linejoin':'round'};
  if(isSel)g.appendChild(mke('path',{...a,d,stroke:'var(--ice)','stroke-width':11,opacity:.22}));
  g.appendChild(mke('path',{...a,d,stroke:'#000','stroke-width':5.5,opacity:.4}));
  g.appendChild(mke('path',{...a,d,stroke:w.color,'stroke-width':3.2}));
  g.appendChild(mke('path',{...a,d,stroke:'transparent','stroke-width':26}));
  if(isSel&&w.label){
    const lw=Math.max(20,w.label.length*6.2+10);
    g.appendChild(mke('rect',{x:mid.x-lw/2,y:mid.y-9,width:lw,height:16,rx:4,fill:'#07101a',opacity:.92}));
    const t=mke('text',{x:mid.x,y:mid.y+3,'text-anchor':'middle','font-size':11,'font-family':'DM Sans','font-weight':700,fill:'#c0d4e0','pointer-events':'none'});
    t.textContent=w.label;g.appendChild(t);
  }
  return g;
}
function mkHandles(){
  hL.innerHTML='';
  if(!sel)return;
  if(sel.kind==='node'){
    const n=gn(sel.id);if(!n)return;
    const{w,h}=ndim(n),rad=(n.rotation||0)*Math.PI/180;
    // 4 resize handles
    [{lx:w/2,ly:0,ic:'⇔'},{lx:-w/2,ly:0,ic:'⇔'},{lx:0,ly:h/2,ic:'⇕'},{lx:0,ly:-h/2,ic:'⇕'}].forEach(({lx,ly,ic})=>{
      const r=rot(lx,ly,rad);const hx=n.x+r.x,hy=n.y+r.y;
      const c=mke('circle',{cx:hx,cy:hy,r:15,fill:'#162230',stroke:'var(--ice)','stroke-width':2,class:'hdl'});
      const t=mke('text',{x:hx,y:hy,'text-anchor':'middle','dominant-baseline':'middle','font-size':13,fill:'var(--ice)','pointer-events':'none'});
      t.textContent=ic;hL.appendChild(c);hL.appendChild(t);
    });
    // rotate handle
    const ar=rot(0,-(h/2+42),rad);const hx=n.x+ar.x,hy=n.y+ar.y;
    const el=rot(0,-h/2,rad);
    hL.appendChild(mke('line',{x1:n.x+el.x,y1:n.y+el.y,x2:hx,y2:hy,stroke:'#ffd24f','stroke-width':2,'stroke-dasharray':'4,3','pointer-events':'none'}));
    const rc=mke('circle',{cx:hx,cy:hy,r:16,fill:'#ffd24f',stroke:'#04202c','stroke-width':2,class:'hdl'});
    const rt=mke('text',{x:hx,y:hy,'text-anchor':'middle','dominant-baseline':'middle','font-size':17,fill:'#04202c','pointer-events':'none','font-weight':'bold'});
    rt.textContent='↻';hL.appendChild(rc);hL.appendChild(rt);
  }else if(sel.kind==='wire'){
    const w=gw(sel.id);if(!w)return;const g=wgeom(w);if(!g)return;
    const mk=(x,y,fill)=>{const c=mke('circle',{cx:x,cy:y,r:13,fill,stroke:'#04202c','stroke-width':2,class:'hdl'});hL.appendChild(c);};
    mk(g.p1.x,g.p1.y,'var(--ice)');mk(g.p2.x,g.p2.y,'var(--emb)');mk(g.mid.x,g.mid.y,'#ffd24f');
  }
}
function renderAll(){
  nL.innerHTML='';wL.innerHTML='';hL.innerHTML='';
  P.wires.forEach(w=>wL.appendChild(mkWireEl(w)));
  P.nodes.forEach(n=>nL.appendChild(mkNodeEl(n)));
  mkHandles();
  document.getElementById('hint').style.display=P.nodes.length?'none':'block';
  buildLegend();
  document.getElementById('tDel').disabled=!sel;
}
function updN(n){const o=nL.querySelector(`[data-id="${n.id}"]`);if(o)nL.replaceChild(mkNodeEl(n),o);}
function updWsOf(nid){P.wires.forEach(w=>{if(w.fromId!==nid&&w.toId!==nid)return;const o=wL.querySelector(`[data-wid="${w.id}"]`);if(o)wL.replaceChild(mkWireEl(w),o);});}

// ─────────────────────────────────────────────────────────────
// POINTER EVENTS — everything goes through the SVG root
// touch-action:none → browser hands all touches to us
// ─────────────────────────────────────────────────────────────
let ptrs=new Map();   // pointerId → {cx,cy}
let op=null;          // active operation

cvs.addEventListener('pointerdown',onDn,{passive:false});
cvs.addEventListener('pointermove',onMv,{passive:false});
cvs.addEventListener('pointerup',  onUp);
cvs.addEventListener('pointercancel',onUp);

function onDn(e){
  e.preventDefault();
  cvs.setPointerCapture(e.pointerId);
  ptrs.set(e.pointerId,{cx:e.clientX,cy:e.clientY});

  // 2+ fingers → pan+pinch
  if(ptrs.size>=2){
    const arr=[...ptrs.values()];
    op={t:'pinch',d0:dist2(arr[0],arr[1]),m0:mid2(arr[0],arr[1]),vb0:{...vb}};
    return;
  }

  const s=c2s(e.clientX,e.clientY);

  if(mode==='place'&&armT){
    phist();
    const n={id:uid(),type:armT,x:Math.round(s.x),y:Math.round(s.y),label:'',rotation:0};
    if(armT==='board')n.terminals=['R','C','G','Y','W','O/B'];
    P.nodes.push(n);setMode('sel');
    sel={kind:'node',id:n.id};renderAll();openInsN(n);saveDef();
    return;
  }
  if(mode==='cfrom'){const n=hitN(s.x,s.y);if(n){cfromId=n.id;setMode('cto');setSt('Тепер торкнись приладу-призначення (2/2)');}return;}
  if(mode==='cto'){const n=hitN(s.x,s.y);if(n&&n.id!==cfromId){mkCable(cfromId,n.id);setMode('sel');}return;}

  // select mode: handle → node → wire → pan
  const h=hitH(s.x,s.y);
  if(h){phist();op={t:h.t,cx0:e.clientX,cy0:e.clientY,...h};return;}

  const n=hitN(s.x,s.y);
  if(n){
    if(!sel||sel.id!==n.id||sel.kind!=='node'){sel={kind:'node',id:n.id};renderAll();openInsN(n);}
    op={t:'nd',n,cx0:e.clientX,cy0:e.clientY,ox:n.x,oy:n.y,mv:false};
    return;
  }
  const w=hitW(s.x,s.y);
  if(w){if(!sel||sel.id!==w.id||sel.kind!=='wire'){sel={kind:'wire',id:w.id};renderAll();openInsW(w);}op={t:'wsel'};return;}

  // empty → desel + pan
  if(sel){sel=null;closeIns();renderAll();}
  op={t:'pan'};
}

function onMv(e){
  e.preventDefault();
  const prev=ptrs.get(e.pointerId)||{cx:e.clientX,cy:e.clientY};
  ptrs.set(e.pointerId,{cx:e.clientX,cy:e.clientY});

  // pinch
  if(ptrs.size>=2&&op?.t==='pinch'){
    const arr=[...ptrs.values()];
    const d1=dist2(arr[0],arr[1]),m1=mid2(arr[0],arr[1]);
    const sc=op.d0/Math.max(d1,1);
    const nw=Math.max(300,Math.min(5200,op.vb0.w*sc)),nh=nw*(op.vb0.h/op.vb0.w);
    // SVG coord of initial midpoint
    const r=vbR();
    const svmx=op.vb0.x+(op.m0.cx-r.left)/r.width*op.vb0.w;
    const svmy=op.vb0.y+(op.m0.cy-r.top)/r.height*op.vb0.h;
    const fx=(m1.cx-r.left)/r.width,fy=(m1.cy-r.top)/r.height;
    vb={x:svmx-fx*nw,y:svmy-fy*nh,w:nw,h:nh};
    applyVB();updateZlbl();
    return;
  }
  if(!op)return;

  // incremental delta in CSS pixels
  const dcx=e.clientX-prev.cx,dcy=e.clientY-prev.cy;
  const ds=d2s(dcx,dcy);

  if(op.t==='pan'){vb.x-=ds.dx;vb.y-=ds.dy;applyVB();return;}

  if(op.t==='nd'){
    const moved=op.mv||(Math.hypot(e.clientX-op.cx0,e.clientY-op.cy0)>4);
    if(moved&&!op.mv){op.mv=true;phist();}
    if(op.mv){
      op.n.x+=ds.dx;op.n.y+=ds.dy;
      const ge=nL.querySelector(`[data-id="${op.n.id}"]`);
      if(ge)ge.setAttribute('transform',ntx(op.n));
      updWsOf(op.n.id);mkHandles();
    }
    return;
  }

  // resize handles
  if(op.t==='rr'||op.t==='rl'||op.t==='rb'||op.t==='rt'){
    const n=op.n,rad=(n.rotation||0)*Math.PI/180;
    if(n.nodeW==null){const d=ndim(n);n.nodeW=d.w;n.nodeH=d.h;}
    const axis=(op.t==='rr'||op.t==='rl')?{lx:op.t==='rr'?1:-1,ly:0}:{lx:0,ly:op.t==='rb'?1:-1};
    const aS=rot(axis.lx,axis.ly,rad);
    const proj=(dcx*aS.x+dcy*aS.y)*(vb.w/vbR().width)*2;
    if(op.t==='rr'||op.t==='rl')n.nodeW=Math.max(24,n.nodeW+proj);
    else n.nodeH=Math.max(16,n.nodeH+proj);
    updN(n);updWsOf(n.id);mkHandles();
    return;
  }

  // rotate
  if(op.t==='ro'){
    const n=op.n,r=vbR();
    const ncx=r.left+(n.x-vb.x)/vb.w*r.width,ncy=r.top+(n.y-vb.y)/vb.h*r.height;
    const a0=Math.atan2(prev.cy-ncy,prev.cx-ncx),a1=Math.atan2(e.clientY-ncy,e.clientX-ncx);
    let da=(a1-a0)*180/Math.PI;
    n.rotation=(((n.rotation||0)+da)%360+360)%360;
    n.rotation=Math.round(n.rotation/15)*15; // snap 15°
    const ge=nL.querySelector(`[data-id="${n.id}"]`);
    if(ge)ge.setAttribute('transform',ntx(n));
    updWsOf(n.id);mkHandles();
    return;
  }

  // wire endpoint drag
  if(op.t==='wf'||op.t==='wt'){
    const s=c2s(e.clientX,e.clientY),end=op.t==='wf'?'from':'to';
    op.w[end+'Id']=null;op.w[end+'Point']={x:s.x,y:s.y};op.w[end+'Term']=null;op.w.bend=null;
    const o=wL.querySelector(`[data-wid="${op.w.id}"]`);if(o)wL.replaceChild(mkWireEl(op.w),o);mkHandles();
    return;
  }
  if(op.t==='wb'){
    const s=c2s(e.clientX,e.clientY);op.w.bend={x:s.x,y:s.y};
    const o=wL.querySelector(`[data-wid="${op.w.id}"]`);if(o)wL.replaceChild(mkWireEl(op.w),o);mkHandles();
    return;
  }
}

function onUp(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size<2&&op?.t==='pinch'){op=null;return;}
  if(!op){return;}
  const ot=op.t;op=null;
  if(ot==='nd'&&op===null){/* already saved op */}
  if(ot==='wf'||ot==='wt'){
    const w=ot==='wf'?P.wires.find(x=>x.id===sel?.id):P.wires.find(x=>x.id===sel?.id);
    // we need to access the wire from our drag state — rebuild from current sel
    const cw=sel?.kind==='wire'?gw(sel.id):null;
    if(cw){
      const end=ot==='wf'?'from':'to',s=c2s(e.clientX,e.clientY);
      const hit=nearN(s.x,s.y,null);
      if(hit){cw[end+'Id']=hit.n.id;delete cw[end+'Point'];cw[end+'Term']=hit.term??null;}
      cw.bend=null;
    }
    renderAll();saveDef();
  }
  if(ot==='ro'||ot.startsWith('r')||ot==='wb'){saveDef();}
  if(ot==='nd'){saveDef();}
}

// Fix for wire endpoint drag: track the wire in op properly
cvs.addEventListener('pointerup',e2=>{
  // handled above
},true);

function dist2(a,b){return Math.hypot(b.cx-a.cx,b.cy-a.cy);}
function mid2(a,b){return{cx:(a.cx+b.cx)/2,cy:(a.cy+b.cy)/2};}

// ─────────────────────────────────────────────────────────────
// UNDO
// ─────────────────────────────────────────────────────────────
function phist(){H.push(JSON.stringify({nodes:P.nodes,wires:P.wires}));if(H.length>40)H.shift();}
function undo(){

    case'tri':    return`<svg viewBox="-18 -18 36 36"><polygon points="0,-14 13,12 -13,12" fill="${c}"/></svg>`;
    case'rectR':  return`<svg viewBox="-18 -18 36 36"><rect x="-14" y="-7" width="28" height="14" rx="2" fill="${c}" transform="rotate(20)"/></svg>`;

function nextAc(){
  const used=[...Object.values(EQ),...CT].map(e=>hexHue(e.ac));
  let best=0,bsc=-1;
  for(let i=0;i<36;i++){const h=(i*137.5+17)%360;const sc=used.length?Math.min(...used.map(u=>{const d=Math.abs(h-u)%360;return d>180?360-d:d;})):999;if(sc>bsc){bsc=sc;best=h;}}
  return hsl2hex(best,63,54);
}
function hexHue(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0;if(mx!==mn){const d=mx-mn;h=mx===r?((g-b)/d+6)%6:mx===g?(b-r)/d+2:(r-g)/d+4;h*=60;}return h;}
function hsl2hex(h,s,l){s/=100;l/=100;const f=n=>{const k=(n+h/30)%12,a=s*Math.min(l,1-l);return Math.round(255*(l-a*Math.max(-1,Math.min(k-3,9-k,1))));};return'#'+[f(0),f(8),f(4)].map(v=>v.toString(16).padStart(2,'0')).join('');}
function openCTMod(){
  const sg=SH_NAMES.map(s=>`<button class="sb2" data-s="${s.k}">${miniSVG(s.k,'var(--ice)')}<span>${s.l}</span></button>`).join('');

      <button class="btn pr" id="ghS" style="width:100%">Зберегти</button>`}
    </div>`);
  document.getElementById('fmD')?.addEventListener('click',()=>{dlJson();closeMod();});
  document.getElementById('fmO')?.addEventListener('click',()=>{closeMod();document.getElementById('fi').click();});
  document.getElementById('fmP')?.addEventListener('click',async()=>{closeMod();await pushGH(cfg);});
  document.getElementById('fmR')?.addEventListener('click',async()=>{await sd(GHKEY);closeMod();document.getElementById('bFile').click();});
  document.getElementById('ghS')?.addEventListener('click',async()=>{
    const t=document.getElementById('ghT')?.value?.trim(),r=document.getElementById('ghR')?.value?.trim()?.replace(/^https?:\/\/github\.com\//,'').replace(/\.git$/,'');
    const b=document.getElementById('ghB')?.value?.trim()||'main',f=document.getElementById('ghF')?.value?.trim()||'wiring';
    if(!t||!r?.includes('/')){toast('Заповни токен і репозиторій');return;}
    await ss(GHKEY,JSON.stringify({token:t,repo:r,branch:b,folder:f}));toast('Збережено');closeMod();
  });
});
async function lgcfg(){try{const r=await sg(GHKEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function slug(s){return(s||'shema').toLowerCase().replace(/[^a-z0-9а-яіїє\-]/gi,'-').replace(/^-+|-+$/g,'')||'shema';}
function dlJson(){const b=new Blob([JSON.stringify(P,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=slug(P.name)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(a.href),1e3);toast('Файл завантажено');}
async function pushGH(cfg){
  toast('Зберігаю на GitHub…');
  try{
    const path=(cfg.folder?cfg.folder.replace(/^\/|\/$/g,'')+'/':'')+slug(P.name)+'.json';
    const url=`https://api.github.com/repos/${cfg.repo}/contents/${path}`;
    const hd={'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json'};
    let sha;const g=await fetch(url+`?ref=${cfg.branch||'main'}`,{headers:hd});if(g.ok)sha=(await g.json()).sha;
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(P,null,2))));
    const r=await fetch(url,{method:'PUT',headers:{...hd,'Content-Type':'application/json'},body:JSON.stringify({message:'Схема: '+P.name,content,sha,branch:cfg.branch||'main'})});
    if(!r.ok){const t=await r.text();throw new Error(r.status+': '+t);}
    toast('Збережено на GitHub ✓');
  }catch(err){toast('GitHub: '+(err.message||'помилка'));}
}
document.getElementById('fi').addEventListener('change',e=>{
  const f=e.target.files[0];e.target.value='';if(!f)return;
  const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!Array.isArray(d.nodes)||!Array.isArray(d.wires)){toast('Не схема');return;}d.id=d.id||uid();P=d;document.getElementById('pname').value=P.name||'';H=[];sel=null;closeIns();renderAll();saveDef();toast('Схему відкрито');}catch(e){toast('Помилка читання');}};r.readAsText(f);
});

async function newProj(){P=blank('Нова схема '+new Date().toLocaleDateString('uk-UA'));document.getElementById('pname').value=P.name;H=[];sel=null;closeIns();renderAll();await svNow();}

// ─────────────────────────────────────────────────────────────
// PDF
// ─────────────────────────────────────────────────────────────
async function exportPDF(){
  if(!P.nodes.length){toast('Додай хоча б один прилад');return;}toast('Готую PDF…');
  let mx=Infinity,my=Infinity,Mx=-Infinity,My=-Infinity;
  P.nodes.forEach(n=>{const{w,h}=ndim(n);const p=60;mx=Math.min(mx,n.x-w/2-p);my=Math.min(my,n.y-h/2-p);Mx=Math.max(Mx,n.x+w/2+p);My=Math.max(My,n.y+h/2+p);});
  const bw=Mx-mx,bh=My-my+60;
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`${mx} ${my} ${bw} ${bh}`);svg.setAttribute('width',bw);svg.setAttribute('height',bh);svg.setAttribute('xmlns',NS);
  const bg=document.createElementNS(NS,'rect');bg.setAttribute('x',mx-9999);bg.setAttribute('y',my-9999);bg.setAttribute('width',99999);bg.setAttribute('height',99999);bg.setAttribute('fill','#fff');svg.appendChild(bg);
  // wires
  P.wires.forEach(w=>{const g=wgeom(w);if(!g)return;const{p1,p2}=g;const d=w.bend?`M${p1.x},${p1.y}L${w.bend.x},${w.bend.y}L${p2.x},${p2.y}`:`M${p1.x},${p1.y}L${p2.x},${p2.y}`;
    const a={'fill':'none','stroke-linecap':'round'};
    const s1=document.createElementNS(NS,'path');Object.entries({...a,d,stroke:'#bbb','stroke-width':5}).forEach(([k,v])=>s1.setAttribute(k,v));svg.appendChild(s1);
    const s2=document.createElementNS(NS,'path');Object.entries({...a,d,stroke:w.color,'stroke-width':3}).forEach(([k,v])=>s2.setAttribute(k,v));svg.appendChild(s2);
    if(w.label){const mid=w.bend||{x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};const lw=Math.max(20,w.label.length*6+10);const rb=document.createElementNS(NS,'rect');rb.setAttribute('x',mid.x-lw/2);rb.setAttribute('y',mid.y-8);rb.setAttribute('width',lw);rb.setAttribute('height',15);rb.setAttribute('rx',3);rb.setAttribute('fill','#fff');rb.setAttribute('stroke','#ddd');rb.setAttribute('stroke-width',1);svg.appendChild(rb);const t=document.createElementNS(NS,'text');t.setAttribute('x',mid.x);t.setAttribute('y',mid.y+2);t.setAttribute('text-anchor','middle');t.setAttribute('font-size',10);t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('font-weight',700);t.setAttribute('fill','#222');t.textContent=w.label;svg.appendChild(t);}
  });
  // nodes
  P.nodes.forEach(n=>{
    const e=EQ[n.type],{w,h}=ndim(n);
    const g=document.createElementNS(NS,'g');g.setAttribute('transform',`translate(${n.x},${n.y}) rotate(${n.rotation||0})`);
    if(n.type==='note'){const r=document.createElementNS(NS,'rect');r.setAttribute('x',-w/2);r.setAttribute('y',-14);r.setAttribute('width',w);r.setAttribute('height',28);r.setAttribute('rx',5);r.setAttribute('fill','#f5f5f5');r.setAttribute('stroke','#ccc');g.appendChild(r);const t=document.createElementNS(NS,'text');t.setAttribute('x',0);t.setAttribute('y',4);t.setAttribute('text-anchor','middle');t.setAttribute('font-size',12);t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('fill','#333');t.textContent=n.label||'Текст';g.appendChild(t);}
    else{
      let sh;
      switch(e.sh){
        case'circle':sh=document.createElementNS(NS,'circle');sh.setAttribute('r',w/2);break;
        case'hex':sh=document.createElementNS(NS,'polygon');sh.setAttribute('points',hxPts(w/2,h/2));break;
        case'diamond':sh=document.createElementNS(NS,'polygon');sh.setAttribute('points',`0,${-h/2} ${w/2},0 0,${h/2} ${-w/2},0`);break;
        case'tri':sh=document.createElementNS(NS,'polygon');sh.setAttribute('points',`0,${-h/2} ${w/2},${h/2} ${-w/2},${h/2}`);break;
        default:sh=document.createElementNS(NS,'rect');sh.setAttribute('x',-w/2);sh.setAttribute('y',-h/2);sh.setAttribute('width',w);sh.setAttribute('height',h);sh.setAttribute('rx',6);
      }
      sh.setAttribute('fill',e.ac);sh.setAttribute('stroke','#555');sh.setAttribute('stroke-width',1.5);g.appendChild(sh);
      const t=document.createElementNS(NS,'text');t.setAttribute('x',0);t.setAttribute('y',n.type==='board'?-h/2+18:0);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');t.setAttribute('font-size',Math.min(13,w/4));t.setAttribute('font-family','DM Sans,sans-serif');t.setAttribute('font-weight',700);t.setAttribute('fill',n.type==='board'?'#eee':'#111');t.textContent=trunc(n.label||e.ab,14);g.appendChild(t);
      if(n.type==='board'&&n.terminals){n.terminals.forEach((lb,i)=>{const c2=n.terminals.length||1,lx=-w/2+(w/(c2+1))*(i+1),by=h/2;const rb=document.createElementNS(NS,'rect');rb.setAttribute('x',lx-9);rb.setAttribute('y',by-7);rb.setAttribute('width',18);rb.setAttribute('height',14);rb.setAttribute('rx',2);rb.setAttribute('fill','#fff');rb.setAttribute('stroke',e.ac);rb.setAttribute('stroke-width',1.2);g.appendChild(rb);const tb=document.createElementNS(NS,'text');tb.setAttribute('x',lx);tb.setAttribute('y',by+1);tb.setAttribute('text-anchor','middle');tb.setAttribute('dominant-baseline','middle');tb.setAttribute('font-size',8);tb.setAttribute('font-family','DM Sans,sans-serif');tb.setAttribute('font-weight',700);tb.setAttribute('fill','#222');tb.textContent=lb||'·';g.appendChild(tb);});}
    }
    svg.appendChild(g);
  });
  // title
  const t1=document.createElementNS(NS,'text');t1.setAttribute('x',mx+10);t1.setAttribute('y',My+28);t1.setAttribute('font-size',17);t1.setAttribute('font-family','DM Sans,sans-serif');t1.setAttribute('font-weight',700);t1.setAttribute('fill','#111');t1.textContent=P.name||'Схема';svg.appendChild(t1);
  const t2=document.createElementNS(NS,'text');t2.setAttribute('x',mx+10);t2.setAttribute('y',My+45);t2.setAttribute('font-size',10);t2.setAttribute('font-family','DM Sans,sans-serif');t2.setAttribute('fill','#666');t2.textContent='Frost Hawk HVAC · '+new Date().toLocaleDateString('uk-UA');svg.appendChild(t2);
  const xml=new XMLSerializer().serializeToString(svg);
  const img=new Image();
  await new Promise((res,rej)=>{img.onload=res;img.onerror=rej;img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));});
  const sc=2,cv2=document.createElement('canvas');cv2.width=bw*sc;cv2.height=bh*sc;
  const ctx=cv2.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv2.width,cv2.height);ctx.drawImage(img,0,0,cv2.width,cv2.height);
  const du=cv2.toDataURL('image/png',1);
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:bw>bh?'landscape':'portrait',unit:'pt',format:'a4'});
  const pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight(),m=28;
  const rr=Math.min((pw-m*2)/bw,(ph-m*2)/bh),iw=bw*rr,ih=bh*rr;
  doc.addImage(du,'PNG',(pw-iw)/2,m,iw,ih);
  const seen=new Map();P.wires.forEach(w=>{if(w.label)seen.set(w.color+'|'+w.label,w);});
  if(seen.size){let ly=m+ih+18;doc.setFontSize(9);doc.setTextColor(80,90,100);doc.text('Легенда:',m,ly);ly+=13;[...seen.values()].forEach((w,i)=>{const x=m+(i%3)*180,y=ly+Math.floor(i/3)*13;doc.setFillColor(w.color);doc.circle(x+4,y-3,4,'F');doc.setTextColor(40,50,60);doc.text(w.label,x+14,y);});}
  doc.save(slug(P.name)+'.pdf');toast('PDF готовий ✓');
}

let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2200);}

// ─────────────────────────────────────────────────────────────
// FIX: wire endpoint drag — we need to save wire ref in op
// Override the wire hit drag to properly track
// ─────────────────────────────────────────────────────────────
// (already handled: op.w is set in hitH → passed through op)
// Fix onUp for wire endpoint release:
const _origOnUp=onUp;
cvs.removeEventListener('pointerup',onUp);
cvs.addEventListener('pointerup',function(e){
  ptrs.delete(e.pointerId);
  if(ptrs.size<2&&op?.t==='pinch'){op=null;return;}
  if(!op){return;}
  const ot=op.t,ow=op.w;
  if(ot==='wf'||ot==='wt'){
    op=null;
    if(ow){
      const end=ot==='wf'?'from':'to',s=c2s(e.clientX,e.clientY);
      const hit=nearN(s.x,s.y,null);
      if(hit){ow[end+'Id']=hit.n.id;delete ow[end+'Point'];ow[end+'Term']=hit.term??null;}
      ow.bend=null;
    }
    renderAll();saveDef();return;
  }
  const prevOp=op;op=null;
  if(ot==='wb'||ot==='ro'||ot==='rr'||ot==='rl'||ot==='rb'||ot==='rt'){saveDef();renderAll();return;}
  if(ot==='nd'&&prevOp?.mv){saveDef();}
});
